let tlDragSrc = null;
let tlWasDragging = false;

function setupTimelineDnD() {
  // Bars — drag source
  document.querySelectorAll('.tl-bar').forEach(bar => {
    bar.addEventListener('dragstart', e => {
      tlDragSrc = bar.dataset.id;
      tlWasDragging = true;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', tlDragSrc);
      requestAnimationFrame(() => bar.classList.add('tl-dragging'));
    });
    bar.addEventListener('dragend', () => {
      bar.classList.remove('tl-dragging');
      document.querySelectorAll('.tl-data-cell').forEach(c => c.classList.remove('tl-drop-over'));
      tlDragSrc = null;
      setTimeout(() => { tlWasDragging = false; }, 50);
    });
    // Click — open modal (only if not dragging)
    bar.addEventListener('click', e => {
      if (tlWasDragging) return;
      openModal(bar.dataset.id);
    });
  });

  // Cells — drop targets
  document.querySelectorAll('.tl-data-cell').forEach(cell => {
    cell.addEventListener('dragover', e => {
      if (!tlDragSrc) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      cell.classList.add('tl-drop-over');
    });
    cell.addEventListener('dragleave', e => {
      if (!cell.contains(e.relatedTarget)) cell.classList.remove('tl-drop-over');
    });
    cell.addEventListener('drop', e => {
      e.preventDefault();
      cell.classList.remove('tl-drop-over');
      const id = tlDragSrc || e.dataTransfer.getData('text/plain');
      if (!id) return;
      const newBucket = cell.dataset.mes;
      const proj = allProjects.find(p => p.id === id);
      if (!proj || !newBucket) return;
      const prevBucket = getDisplayBucket(proj);
      if (prevBucket === newBucket) return;

      // Move bar in DOM
      const barEl = document.querySelector(`.tl-bar[data-id="${id}"]`);
      if (barEl) {
        barEl.dataset.mes = newBucket;
        cell.appendChild(barEl);
      }

      // Update local state
      if (newBucket === 'H2 sin mes') { proj.mes = 'Backlog'; proj.semestre = 'H2 2026'; }
      else if (newBucket === 'Backlog') { proj.mes = 'Backlog'; proj.semestre = 'Backlog'; }
      else {
        proj.mes = newBucket;
        proj.semestre = H1_MONTHS.has(newBucket) ? 'H1 2026' : 'H2 2026';
      }
      patchMes(id, newBucket, prevBucket, proj);
    });
  });
}

// ── Tooltip hover en timeline ─────────────────────────────────
function setupTlTooltip() {
  const tip = document.getElementById('tl-tooltip');
  document.querySelectorAll('.tl-bar').forEach(bar => {
    const proj = allProjects.find(p => p.id === bar.dataset.id);
    if (!proj) return;
    bar.addEventListener('mouseenter', e => {
      tip.textContent = proj.nombre;
      tip.classList.add('visible');
      moveTip(e);
    });
    bar.addEventListener('mousemove', moveTip);
    bar.addEventListener('mouseleave', () => tip.classList.remove('visible'));
  });
  function moveTip(e) {
    const x = e.clientX + 12, y = e.clientY - 36;
    const vw = window.innerWidth, tipW = tip.offsetWidth || 180;
    tip.style.left = (x + tipW > vw ? vw - tipW - 8 : x) + 'px';
    tip.style.top  = (y < 8 ? e.clientY + 16 : y) + 'px';
  }
}

function handleOverlayClick(e) { if (e.target===document.getElementById('modal-overlay')) closeModal(); }

let _selectedArea = '';       // singleSelect for create mode
let _selectedCategorias = []; // multipleSelects for create mode

function renderAreaToggle(activeArea) {
  const container = document.getElementById('area-toggle');
  if (!container) return;
  const current = typeof activeArea === 'string' ? activeArea : '';
  container.innerHTML = Object.entries(AREA_COLORS).map(([a, c]) => {
    const isActive = current === a;
    const style = isActive ? `background:${c.bg};color:${c.text};border-color:${c.text}40` : '';
    return `<button class="ptoggle-btn${isActive?' active':''}" style="${style}" onclick="updateAreaFromModal('${a}')">${c.emoji} ${a}</button>`;
  }).join('');
}

function renderCategoriaToggle(activeCats) {
  const container = document.getElementById('categoria-toggle');
  if (!container) return;
  const arr = Array.isArray(activeCats) ? activeCats : [];
  container.innerHTML = Object.entries(CATEGORIA_COLORS).map(([c, ci]) => {
    const isActive = arr.includes(c);
    const style = isActive ? `background:${ci.bg};color:${ci.text};border-color:${ci.text}40` : '';
    return `<button class="ptoggle-btn${isActive?' active':''}" style="${style}" onclick="updateCategoriaFromModal('${c}')">${c}</button>`;
  }).join('');
}

function saveFechas() {
  if (!modalId) return;
  const proj = allProjects.find(p => p.id === modalId);
  if (!proj) return;
  proj.fechaInicio = document.getElementById('modal-fecha-inicio').value || '';
  proj.fechaFin    = document.getElementById('modal-fecha-fin').value    || '';
  saveLocal();
  patchAirtable(proj._atId, {
    [AT_DASH_FIELDS.fechaInicio]: proj.fechaInicio || null,
    [AT_DASH_FIELDS.fechaFin]:    proj.fechaFin    || null,
  });
}

function updateAreaFromModal(area) {
  if (modalMode === 'create') {
    _selectedArea = _selectedArea === area ? '' : area;
    renderAreaToggle(_selectedArea);
    return;
  }
  if (!modalId) return;
  const proj = allProjects.find(p => p.id === modalId);
  if (!proj) return;
  proj.area = proj.area === area ? '' : area;
  saveLocal();
  patchAirtable(proj._atId, { [AT_DASH_FIELDS.area]: proj.area || null });
  renderAreaToggle(proj.area);
  // Refresh meta area badge
  const meta = document.getElementById('modal-meta');
  if (meta) {
    meta.querySelectorAll('[data-area-badge]').forEach(b => b.remove());
    if (proj.area) {
      const ac = AREA_COLORS[proj.area] || { emoji:'🏷️', bg:'#F8FAFC', text:'#475569' };
      meta.insertAdjacentHTML('beforeend', `<span class="badge" data-area-badge title="${proj.area}" style="border:1px solid #E2E8F0;background:${ac.bg};color:${ac.text};font-size:11px;padding:2px 5px">${ac.emoji} ${proj.area}</span>`);
    }
  }
  const cardEl = document.getElementById(`kcard-${proj.id}`);
  if (cardEl) { cardEl.outerHTML = renderKCard(proj); }
}

function updateCategoriaFromModal(cat) {
  if (modalMode === 'create') {
    if (_selectedCategorias.includes(cat)) _selectedCategorias = _selectedCategorias.filter(c => c !== cat);
    else _selectedCategorias.push(cat);
    renderCategoriaToggle(_selectedCategorias);
    return;
  }
  if (!modalId) return;
  const proj = allProjects.find(p => p.id === modalId);
  if (!proj) return;
  const cats = Array.isArray(proj.categoria) ? [...proj.categoria] : [];
  const idx = cats.indexOf(cat);
  if (idx >= 0) cats.splice(idx, 1); else cats.push(cat);
  proj.categoria = cats;
  saveLocal();
  patchAirtable(proj._atId, { [AT_DASH_FIELDS.categoria]: cats.length ? cats : null });
  renderCategoriaToggle(cats);
  const cardEl = document.getElementById(`kcard-${proj.id}`);
  if (cardEl) { cardEl.outerHTML = renderKCard(proj); }
}

function syncGroupToggle(estatus) {
  const group = getStatusGroup(estatus);
  document.querySelectorAll('.sgt-btn').forEach(b => b.classList.toggle('active', b.dataset.group === group));
}

async function setGroupFromModal(group) {
  if (modalMode === 'create') {
    const newStatus = STATUS_GROUPS[group].statuses[0];
    await updateStatusFromModal(newStatus);
    return;
  }
  if (!modalId) return;
  const proj = allProjects.find(p => p.id === modalId);
  if (!proj) return;
  if (getStatusGroup(proj.estatus) === group) return;
  const newStatus = STATUS_GROUPS[group].statuses[0];
  await updateStatusFromModal(newStatus);
}

// ── PATCH estatus (modal) ─────────────────────────────────────
async function updateStatusFromModal(newStatus) {
  if (modalMode === 'create') {
    syncGroupToggle(newStatus);
    return;
  }
  if (!modalId) return;
  const proj = allProjects.find(p=>p.id===modalId);
  if (!proj||newStatus===proj.estatus) return;
  const prevStatus = proj.estatus;
  const spinner=document.getElementById('modal-spinner');
  spinner.style.display='block';
  try {
    proj.estatus=newStatus;
    saveLocal();
    patchAirtable(proj._atId, { [AT_DASH_FIELDS.estatus]: getStatusGroup(newStatus) });
    syncGroupToggle(newStatus);
    document.querySelector(`.tl-bar[data-id="${modalId}"]`)?.style.setProperty('background',STATUS_GROUPS[getStatusGroup(newStatus)].color);
    const newGc = STATUS_GROUPS[getStatusGroup(newStatus)];
    const kBadge = document.querySelector(`#kcard-${modalId} .k-status-badge`);
    if (kBadge) { kBadge.style.background=newGc.bg; kBadge.style.color=newGc.text; kBadge.textContent=newStatus; }
    const newGroup = getStatusGroup(newStatus);
    const prevGroup = getStatusGroup(prevStatus);
    if (newGroup !== prevGroup) {
      const cardEl = document.getElementById(`kcard-${modalId}`);
      const targetBody = document.querySelector(`.kanban-body[data-group="${newGroup}"]`);
      if (cardEl && targetBody) { targetBody.appendChild(cardEl); refreshKanbanCounts(); cleanEmptyMonthDividers(); }
    }
    updateMetrics(allProjects);
    showToast(`✓ Estatus: ${newStatus}`,'success');
  } catch(err) {
    showToast(`Error: ${err.message}`,'error');
  } finally { spinner.style.display='none'; }
}

function renderModalDesc(desc) {

    ? `<div class="modal-desc-text" onclick="startEditDesc()" title="Haz clic para editar"><p>${escapeHtml(desc)}</p></div>`
    : `<div class="modal-desc-text" onclick="startEditDesc()" title="Haz clic para editar"><p style="color:#B0BEC5;font-style:italic">Haz clic para agregar una descripción…</p></div>`;

function startEditDesc() {
  if (!modalId) return;
  const proj = allProjects.find(p=>p.id===modalId);
  if (!proj) return;
  const container = document.getElementById('modal-desc');
  container.innerHTML = `

      <button class="modal-desc-save" id="modal-desc-save-btn" onclick="saveDesc()">Guardar</button>

function cancelEditDesc() {
  if (!modalId) return;
  const proj = allProjects.find(p=>p.id===modalId);
  if (!proj) return;
  renderModalDesc(proj.desc);
}

async function saveDesc() {
  if (!modalId) return;
  const proj    = allProjects.find(p=>p.id===modalId);
  if (!proj) return;
  const ta      = document.getElementById('modal-desc-ta');
  const saveBtn = document.getElementById('modal-desc-save-btn');
  const newDesc = ta.value.trim();
  if (newDesc === (proj.desc||'').trim()) { cancelEditDesc(); return; }
  const prevDesc = proj.desc;
  saveBtn.disabled = true;
  saveBtn.textContent = 'Guardando…';
  try {
    proj.desc = newDesc;
    saveLocal();
    patchAirtable(proj._atId, { [AT_DASH_FIELDS.desc]: newDesc });
    renderModalDesc(proj.desc);
    showToast('✓ Descripción actualizada', 'success');
  } catch(err) {
    proj.desc = prevDesc;
    saveBtn.disabled = false;
    saveBtn.textContent = 'Guardar';
    showToast('Error al guardar descripción', 'error');
  }
}

// ── Pull desde GitHub ─────────────────────────────────────────
async function pullFromGitHub() {
  const btn = document.getElementById('pull-btn');
  if (btn) btn.classList.add('spinning');
  try {
    const res = await fetch(GH_RAW + '?t=' + Date.now());
    if (!res.ok) throw new Error(`GitHub ${res.status}`);
    allProjects = await res.json();
    saveLocal();
    updateMetrics(allProjects);
    renderProjects();
    showToast('✓ Sincronizado desde GitHub', 'success');
  } catch(err) {
    showToast(`Error al sincronizar: ${err.message}`, 'error');
  } finally {
    if (btn) btn.classList.remove('spinning');
  }
}

// ── Push a GitHub ─────────────────────────────────────────────
async function pushToGitHub() {
  let token = localStorage.getItem('dinn-gh-token');
  if (!token) {
    token = prompt('GitHub Personal Access Token\n(necesita permiso "repo" o "contents:write"):');
    if (!token) return;
    localStorage.setItem('dinn-gh-token', token.trim());
    token = token.trim();
  }
  const btn = document.getElementById('sync-btn');
  btn.classList.add('spinning');
  try {
    // Obtener SHA actual del archivo (requerido para actualizar)
    const getRes = await fetch(GH_API, { headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' } });
    const sha = getRes.ok ? (await getRes.json()).sha : undefined;

    // Codificar contenido en base64 (compatible con Unicode)
    const json  = JSON.stringify(allProjects, null, 2);
    const bytes = new TextEncoder().encode(json);
    const b64   = btoa(String.fromCharCode(...bytes));

    const body  = { message: `Update roadmap data — ${new Date().toLocaleString('es-MX')}`, content: b64 };
    if (sha) body.sha = sha;

    const putRes = await fetch(GH_API, {
      method: 'PUT',
      headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github+json' },
      body: JSON.stringify(body)
    });
    if (!putRes.ok) {
      const e = await putRes.json().catch(()=>({}));
      if (putRes.status === 401) { localStorage.removeItem('dinn-gh-token'); }
      throw new Error(e.message || `HTTP ${putRes.status}`);
    }
    showToast('✓ Guardado en GitHub', 'success');
  } catch(err) {
    showToast(`Error: ${err.message}`, 'error');
  } finally { btn.classList.remove('spinning'); }
}

// ── Anotaciones ─────────────────────────────────────────────
const NOTES_NS = 'dinn-notes-';

function getNotes(projectId) {
  try { return JSON.parse(localStorage.getItem(NOTES_NS + projectId) || '[]'); }
  catch { return []; }
}
function saveNotes(projectId, notes) {
  localStorage.setItem(NOTES_NS + projectId, JSON.stringify(notes));
  // Sync bitácora a Airtable en background
  const proj = allProjects.find(p => p.id === projectId);
  if (proj?._atId) {
    patchAirtable(proj._atId, { [AT_DASH_FIELDS.bitacora]: JSON.stringify(notes) });
  }
}

function formatNoteDate(ts) {
  const d = new Date(ts);
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}, ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

let _noteTimers = [];

function renderNotes(projectId) {
  const container = document.getElementById('modal-notes-list');
  const countEl   = document.getElementById('notes-panel-count');
  if (!container) return;
  _noteTimers.forEach(t => clearTimeout(t));
  _noteTimers = [];

  const notes = getNotes(projectId).slice().sort((a, b) => a.createdAt - b.createdAt);
  if (countEl) countEl.textContent = notes.length || '';

  if (notes.length === 0) {
    container.innerHTML = '<p class="notes-empty">Sin entradas aún.</p>';
    return;
  }

  const EDIT_WINDOW = 5 * 60 * 1000;
  const now = Date.now();

  container.innerHTML = notes.map(n => {
    const canEdit = (now - n.createdAt) < EDIT_WINDOW;
    const editedStr = n.editedAt ? ` <span class="note-edited">· editado</span>` : '';
    const editBtn = canEdit
      ? `<button class="note-edit-btn" onclick="startEditNote('${n.id}','${projectId}')">Editar</button>`
      : '';
    return `<div class="note-item" id="note-${n.id}">
      <div class="note-dot"></div>
      <div class="note-content">
        <div class="note-meta">
          <span class="note-date">${formatNoteDate(n.createdAt)}${editedStr}</span>
          ${editBtn}
        </div>
        <div class="note-body" id="note-body-${n.id}">${escapeHtml(n.text).replace(/\n/g,'<br>')}</div>
      </div>
    </div>`;
  }).join('');
  container.scrollTop = container.scrollHeight;

  // Schedule re-render when each editable note expires
  notes.forEach(n => {
    const remaining = EDIT_WINDOW - (now - n.createdAt);
    if (remaining > 0 && remaining < EDIT_WINDOW) {
      const t = setTimeout(() => { if (modalId === projectId) renderNotes(projectId); }, remaining + 500);
      _noteTimers.push(t);
    }
  });
}

function postNote() {
  if (!modalId) return;
  const textarea = document.getElementById('modal-notes-textarea');
  const text = textarea.value.trim();
  if (!text) return;
  const notes = getNotes(modalId);
  const note = { id: 'n' + Date.now(), text, createdAt: Date.now(), editedAt: null };
  notes.push(note);
  saveNotes(modalId, notes);
  textarea.value = '';
  document.getElementById('notes-post-btn').disabled = true;
  renderNotes(modalId);
}

function startEditNote(noteId, projectId) {
  const notes = getNotes(projectId);
  const note = notes.find(n => n.id === noteId);
  if (!note) return;
  if (Date.now() - note.createdAt >= 5 * 60 * 1000) { renderNotes(projectId); return; }
  const bodyEl = document.getElementById(`note-body-${noteId}`);
  if (!bodyEl) return;
  bodyEl.innerHTML = `
    <textarea class="note-edit-textarea" id="note-edit-${noteId}">${escapeHtml(note.text)}</textarea>
    <div class="note-edit-actions">
      <button class="note-edit-save"   onclick="saveEditNote('${noteId}','${projectId}')">Guardar</button>
      <button class="note-edit-cancel" onclick="renderNotes('${projectId}')">Cancelar</button>
    </div>`;
  document.getElementById(`note-edit-${noteId}`)?.focus();
}

function saveEditNote(noteId, projectId) {
  const notes = getNotes(projectId);
  const note = notes.find(n => n.id === noteId);
  if (!note) return;
  if (Date.now() - note.createdAt >= 5 * 60 * 1000) { renderNotes(projectId); return; }
  const newText = document.getElementById(`note-edit-${noteId}`)?.value.trim();
  if (!newText) return;
  note.text = newText;
  note.editedAt = Date.now();
  saveNotes(projectId, notes);
  renderNotes(projectId);
}

// ── Attachments ─────────────────────────────────────────────
const ATTACH_NS = 'dinn-attach-';

function getAttachments(projectId) {
  try { return JSON.parse(localStorage.getItem(ATTACH_NS + projectId) || '[]'); } catch { return []; }
}
function saveAttachments(projectId, list) {
  localStorage.setItem(ATTACH_NS + projectId, JSON.stringify(list));
}

function renderAttachments(projectId) {
  const list = getAttachments(projectId);
  const container = document.getElementById('attach-list');
  if (!container) return;
  container.innerHTML = list.map((a, i) => {
    const isImg = a.type && a.type.startsWith('image/');
    const ext   = a.name.split('.').pop().toUpperCase().slice(0,4);
    const inner = isImg
      ? `<img src="${a.data}" alt="${escapeHtml(a.name)}">`
      : `<div class="attach-file-icon"><svg viewBox="0 0 24 24" width="24" height="24" fill="none"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="#0B645C" stroke-width="1.5"/><polyline points="14 2 14 8 20 8" stroke="#0B645C" stroke-width="1.5"/></svg><span class="attach-ext">${ext}</span></div>`;
    return `<div class="attach-item" title="${escapeHtml(a.name)}" onclick="openAttachment(${i},'${projectId}')">
      ${inner}
      <div class="attach-item-name">${escapeHtml(a.name)}</div>
      <button class="attach-del" onclick="event.stopPropagation();deleteAttachment(${i},'${projectId}')" title="Eliminar">✕</button>
    </div>`;
  }).join('');
}

function handleAttachFiles(e) {
  const attachSection = document.getElementById('modal-attach-section');
  const id = modalId || attachSection?.dataset.tempId;
  if (!id) return;
  const files = Array.from(e.target.files);
  e.target.value = '';
  const MAX_MB = 5;
  files.forEach(file => {
    if (file.size > MAX_MB * 1024 * 1024) {
      showToast(`"${file.name}" supera ${MAX_MB}MB`, 'error'); return;
    }
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const attachments = getAttachments(id);
        attachments.push({ name: file.name, type: file.type, data: ev.target.result });
        saveAttachments(id, attachments);
        renderAttachments(id);
      } catch (err) {
        showToast('No hay espacio suficiente en el navegador para guardar la imagen', 'error');
      }
    };
    reader.readAsDataURL(file);
  });
}

function openAttachment(index, projectId) {
  const list = getAttachments(projectId);
  const a = list[index];
  if (!a) return;
  if (a.type && a.type.startsWith('image/')) {
    const lb = document.getElementById('lightbox');
    document.getElementById('lightbox-img').src = a.data;
    document.getElementById('lightbox-name').textContent = a.name;
    lb.classList.add('open');
    document.addEventListener('keydown', _lbKeyHandler);
  } else {
    const link = document.createElement('a');
    link.href = a.data; link.download = a.name; link.click();
  }
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.removeEventListener('keydown', _lbKeyHandler);
}
function _lbKeyHandler(e) { if (e.key === 'Escape') closeLightbox(); }

function deleteAttachment(index, projectId) {
  const list = getAttachments(projectId);
  list.splice(index, 1);
  saveAttachments(projectId, list);
  renderAttachments(projectId);
}

function setupAttachDropZone(projectId) {
  const zone = document.getElementById('attach-drop-zone');
  if (!zone) return;
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    const files = Array.from(e.dataTransfer.files);
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => {
        const list = getAttachments(projectId);
        list.push({ name: file.name, type: file.type, data: ev.target.result });
        saveAttachments(projectId, list);
        renderAttachments(projectId);
      };
      reader.readAsDataURL(file);
    });
  });
}

// ── Review Mode ─────────────────────────────────────────────
let _rvQueue = [], _rvIndex = 0, _rvPublished = 0, _rvPassed = 0;

function startReview() {
  _rvQueue = [...allProjects];
  _rvIndex = 0; _rvPublished = 0; _rvPassed = 0;
  document.getElementById('rv-card-wrap').style.display = '';
  document.getElementById('rv-end').classList.remove('active');
  document.getElementById('review-overlay').classList.add('active');
  document.body.style.overflow = 'hidden';
  renderReviewCard();
}

function closeReview() {
  document.getElementById('review-overlay').classList.remove('active');
  document.body.style.overflow = '';
}

function renderReviewCard() {
  if (_rvIndex >= _rvQueue.length) { showReviewEnd(); return; }
  const p = _rvQueue[_rvIndex];
  const total = _rvQueue.length;
  document.getElementById('rv-progress-label').textContent = `${_rvIndex + 1} de ${total}`;
  document.getElementById('rv-progress-fill').style.width = `${(_rvIndex / total) * 100}%`;

  const group = getStatusGroup(p.estatus);
  const gc = STATUS_GROUPS[group] || STATUS_GROUPS['Backlog'];
  const rvAreaBadge = p.area ? (() => { const info = AREA_COLORS[p.area]; return info ? `<span class="badge" style="background:${info.bg};color:${info.text};font-size:9px;padding:2px 8px">${info.emoji} ${p.area}</span>` : ''; })() : '';
  const statusBadge = `<span class="badge" style="background:${gc.color}22;color:${gc.color};font-size:9px;padding:2px 8px">${group}</span>`;

  document.getElementById('rv-badges').innerHTML = rvAreaBadge + statusBadge;
  document.getElementById('rv-title').textContent = p.nombre;
  document.getElementById('rv-textarea').value = '';

  const card = document.getElementById('rv-card');
  card.classList.remove('anim-enter', 'anim-exit-left', 'anim-exit-right');
  void card.offsetWidth;
  card.classList.add('anim-enter');
  setTimeout(() => document.getElementById('rv-textarea').focus(), 260);
}

function reviewAdvance(direction) {
  const card = document.getElementById('rv-card');
  card.classList.remove('anim-enter', 'anim-exit-left', 'anim-exit-right');
  void card.offsetWidth;
  card.classList.add(direction === 'left' ? 'anim-exit-left' : 'anim-exit-right');
  setTimeout(() => { _rvIndex++; renderReviewCard(); }, 190);
}

function reviewPass() { _rvPassed++; reviewAdvance('left'); }

function reviewPublish() {
  const text = document.getElementById('rv-textarea').value.trim();
  if (text && _rvQueue[_rvIndex]) {
    const p = _rvQueue[_rvIndex];
    const notes = getNotes(p.id);
    notes.push({ id: 'n' + Date.now(), text, createdAt: Date.now(), editedAt: null });
    saveNotes(p.id, notes);
    _rvPublished++;
  }
  reviewAdvance('right');
}

function showReviewEnd() {
  document.getElementById('rv-card-wrap').style.display = 'none';
  document.getElementById('rv-end').classList.add('active');
  document.getElementById('rv-progress-label').textContent = `${_rvQueue.length} de ${_rvQueue.length}`;
  document.getElementById('rv-progress-fill').style.width = '100%';
  document.getElementById('rv-end-sub').textContent =
    `${_rvPublished} entrada${_rvPublished !== 1 ? 's' : ''} publicada${_rvPublished !== 1 ? 's' : ''} · ${_rvPassed} proyecto${_rvPassed !== 1 ? 's' : ''} pasado${_rvPassed !== 1 ? 's' : ''}`;
}

// ── Init ────────────────────────────────────────────────────
loadProjects();
</script>

<!-- ── Review Overlay ──────────────────────────────────────── -->
<div id="review-overlay" class="review-overlay">
  <div class="review-topbar">
    <button class="review-close-btn" onclick="closeReview()">×</button>

      <span class="review-progress-label" id="rv-progress-label"></span>

      <div class="review-card-badges" id="rv-badges"></div>
      <div class="review-card-title" id="rv-title"></div>
      <textarea class="review-textarea" id="rv-textarea" placeholder="Nueva entrada en la bitácora…" rows="4"></textarea>
      <div class="review-actions">
        <button class="review-pass-btn" onclick="reviewPass()">Pasar</button>
        <button class="review-publish-btn" onclick="reviewPublish()">
          <svg viewBox="0 0 12 12" fill="none" width="12" height="12"><path d="M2 6l3 3 5-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Publicar

      </div>
    </div>
  </div>

  <div class="review-end" id="rv-end">

    </div>
    <h2 class="review-end-title">¡Revisión completa!</h2>

    </div>
  </div>
</div>
