<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DINN Roadmap 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pine:     #0B645C;
      --elm:      #002421;
      --teal:     #27BCB0;
      --fresno:   #9AD9CF;
      --olive:    #E8F4F3;
      --yellow:   #FFE980;
      --gray-txt: #616161;
      --white:    #FFFFFF;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --shadow-card: 0 1px 3px rgba(0,0,0,.07), 0 4px 12px rgba(0,0,0,.06);
      --shadow-hover: 0 4px 16px rgba(11,100,92,.18);
      --t: 200ms cubic-bezier(.4,0,.2,1);
    }
    html, body { height:100%; overflow:hidden; }
    body { font-family:'Poppins',sans-serif; background:#F4F8F7; color:var(--elm); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
    body > #toast-container { position:fixed; }
    body > .modal-overlay   { position:fixed; }

    /* ── Toasts ─────────────────────────────────────────────── */
    #toast-container { position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px; }
    .toast { padding:12px 20px;border-radius:var(--radius-md);font-size:13px;font-weight:500;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,.18);animation:slideIn .25s ease forwards;max-width:320px; }
    .toast.success { background:#16A34A; }
    .toast.error   { background:#DC2626; }
    @keyframes slideIn  { from{transform:translateX(40px);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes slideOut { from{transform:translateX(0);opacity:1}    to{transform:translateX(40px);opacity:0} }
    @keyframes spin     { to{transform:rotate(360deg)} }

    /* ── Header ─────────────────────────────────────────────── */
    header { background:var(--white);border-bottom:1px solid #DDF0EE;position:sticky;top:0;z-index:100; }
    .header-inner { max-width:1200px;margin:0 auto;padding:0 24px; }
    .header-top { display:flex;align-items:center;gap:16px;padding:16px 0 12px;border-bottom:1px solid var(--olive); }
    .logo { display:flex;align-items:center;gap:10px; }
    .logo-mark { width:36px;height:36px;background:var(--pine);border-radius:var(--radius-sm);display:grid;place-items:center; }
    .logo-mark svg { width:20px;height:20px; }
    .logo-name { font-size:18px;font-weight:700;color:var(--elm);letter-spacing:-.3px; }
    .logo-tag  { font-size:11px;font-weight:500;color:var(--gray-txt);background:var(--olive);padding:2px 8px;border-radius:20px; }
    .header-right { margin-left:auto;display:flex;align-items:center;gap:8px; }

    .view-toggle { display:flex;gap:2px;background:var(--olive);border-radius:var(--radius-sm);padding:3px; }
    .view-btn { font-family:'Poppins',sans-serif;font-size:12px;font-weight:500;padding:5px 12px;border-radius:4px;border:none;cursor:pointer;color:var(--gray-txt);background:transparent;transition:all var(--t);display:flex;align-items:center;gap:5px; }
    .view-btn svg { width:13px;height:13px; }
    .view-btn.active { background:var(--white);color:var(--pine);box-shadow:0 1px 3px rgba(0,0,0,.1); }

    .sync-split { display:flex;border-radius:var(--radius-sm);overflow:hidden;border:1px solid #C5E3E0; }
    .sync-btn { display:flex;align-items:center;gap:6px;font-family:'Poppins',sans-serif;font-size:12px;font-weight:500;color:var(--pine);background:var(--olive);border:none;border-right:1px solid #C5E3E0;padding:7px 12px;cursor:pointer;transition:background var(--t); }
    .sync-btn:last-child { border-right:none; }
    .sync-btn:hover { background:#D0EAE8; }
    .sync-btn svg { width:14px;height:14px; }
    .sync-btn.spinning svg { animation:spin .8s linear infinite; }

    .metrics { display:grid;grid-template-columns:repeat(5,1fr);gap:8px;background:transparent;margin:14px 0; }
    .metric { background:var(--white);padding:14px 20px;display:flex;flex-direction:column;gap:2px;cursor:pointer;transition:all var(--t);border:1.5px solid #DDF0EE;border-radius:var(--radius-md); }
    .metric:hover { background:#F0FAF9;border-color:var(--teal); }
    .metric.active { background:#E8F4F3;border:2px solid var(--teal); }
    .metric-value { font-size:26px;font-weight:700;color:var(--elm);line-height:1; }
    .metric-label { font-size:11px;font-weight:500;color:var(--gray-txt);text-transform:uppercase;letter-spacing:.4px; }
    .metric-dot { width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px; }

    .filters { display:flex;gap:5px;flex-wrap:nowrap;padding:10px 0 6px;align-items:center;overflow-x:auto;-webkit-overflow-scrolling:touch; }
    .filters::-webkit-scrollbar { display:none; }
    .filters + .filters { padding-top:0;padding-bottom:14px; }
    .pill-status-dot { width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;flex-shrink:0; }
    .filter-label { font-size:10px;font-weight:600;color:var(--gray-txt);text-transform:uppercase;letter-spacing:.5px;margin-right:2px;flex-shrink:0; }
    .pill { font-family:'Poppins',sans-serif;font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;border:1.5px solid #DDF0EE;cursor:pointer;transition:all var(--t);background:var(--white);color:var(--elm);white-space:nowrap;flex-shrink:0; }
    .pill:hover { border-color:var(--teal);color:var(--pine); }
    .pill.active { background:var(--pine);color:var(--white);border-color:var(--pine); }

    /* ── Main ─────────────────────────────────────────────── */
    main { padding:28px 24px 0;flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0; }
    main.tl-view { padding:0;display:flex;flex-direction:column;flex:1;min-height:0; }
    .state-box { display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:80px 0;color:var(--gray-txt);font-size:14px; }
    .spinner { width:32px;height:32px;border:3px solid var(--olive);border-top-color:var(--pine);border-radius:50%;animation:spin .7s linear infinite; }

    /* ── Shared ───────────────────────────────────────────── */
    .badge { font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;letter-spacing:.2px;line-height:1.4; }
    .badge-prioridad-alta  { background:#FEE2E2;color:#991B1B; }
    .badge-prioridad-media { background:#FEF3C7;color:#92400E; }
    .badge-prioridad-baja  { background:#F1F5F9;color:#475569; }
    .badge-hoy { font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--yellow);color:#7A5900;letter-spacing:.3px; }

    /* ─────────────────────────────────────────────────────── */
    /* ── KANBAN ───────────────────────────────────────────── */
    /* ─────────────────────────────────────────────────────── */
    .kanban-board { display:flex;gap:12px;overflow-x:auto;align-items:stretch;-webkit-overflow-scrolling:touch;flex:1;min-height:0;padding-bottom:24px; }
    .kanban-board::-webkit-scrollbar { height:6px; }
    .kanban-board::-webkit-scrollbar-track { background:transparent; }
    .kanban-board::-webkit-scrollbar-thumb { background:var(--fresno);border-radius:3px; }

    .kanban-col { flex:0 0 224px;display:flex;flex-direction:column;gap:0;min-height:0; }
    .status-board { gap:16px; }
    .status-board .kanban-col { flex:1;min-width:300px;max-width:480px; }

    .kanban-head { padding:10px 12px 9px;background:var(--white);border-radius:var(--radius-md) var(--radius-md) 0 0;border:1.5px solid #DDF0EE;border-bottom:none;display:flex;align-items:center;justify-content:space-between;gap:6px;user-select:none;flex-shrink:0; }
    .kanban-head.is-current  { border-color:var(--teal);border-top-width:3px;background:#F0FAF9; }
    .kanban-head.is-current .kanban-month { color:var(--pine); }
    .kanban-head.is-current .kanban-cnt   { background:var(--yellow);color:#7A5900; }
    .kanban-head.is-h2bucket { border-color:#BFDBFE;border-top:3px solid #3B82F6;background:#EFF6FF; }
    .kanban-head.is-h2bucket .kanban-month { color:#1D4ED8; }
    .kanban-head.is-h2bucket .kanban-cnt   { background:#DBEAFE;color:#1E40AF; }
    .kanban-month { font-size:12px;font-weight:600;color:var(--elm); }
    .kanban-cnt { font-size:10px;font-weight:600;color:var(--gray-txt);background:var(--olive);padding:2px 7px;border-radius:10px;white-space:nowrap; }

    .kanban-scroll-area { flex:1;min-height:0;overflow-y:auto;border:1.5px solid #DDF0EE;border-top:none;border-radius:0 0 var(--radius-md) var(--radius-md);padding:8px 8px 12px; }
    .kanban-scroll-area::-webkit-scrollbar { width:4px; }
    .kanban-scroll-area::-webkit-scrollbar-track { background:transparent; }
    .kanban-scroll-area::-webkit-scrollbar-thumb { background:transparent;border-radius:2px;transition:background .2s; }
    .kanban-scroll-area:hover::-webkit-scrollbar-thumb { background:var(--fresno); }
    .kanban-body { min-height:40px;display:flex;flex-direction:column;gap:8px;padding:0;border-radius:var(--radius-md);transition:background var(--t); }
    .kanban-body.drag-over { background:var(--olive);outline:2px dashed var(--teal);outline-offset:3px; }

    /* ── H2 divider ─────────────────────────────────────────── */
    .kanban-divider { flex:0 0 28px;display:flex;align-self:stretch;align-items:stretch;pointer-events:none;user-select:none; }
    .kd-inner { display:flex;flex-direction:column;align-items:center;width:100%;padding:12px 0; }
    .kd-inner::before,.kd-inner::after { content:'';flex:1;width:2px;border-radius:2px;background:linear-gradient(to bottom,transparent,var(--teal) 30%,var(--teal) 70%,transparent); }
    .kd-label { font-size:10px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:1.5px;writing-mode:vertical-lr;text-orientation:mixed;padding:10px 0; }

    /* ── Kanban card ─────────────────────────────────────────── */
    .k-card { background:var(--white);border-radius:var(--radius-md);box-shadow:var(--shadow-card);border:1.5px solid transparent;cursor:pointer;transition:box-shadow var(--t),transform var(--t),opacity var(--t),border-color var(--t);flex-shrink:0; }
    .k-card:hover { box-shadow:var(--shadow-hover);transform:translateY(-1px);border-color:var(--fresno); }
    .k-card.is-dragging { opacity:.35;cursor:grabbing;transform:scale(.97) rotate(.8deg);box-shadow:none; }
    .k-card.is-moving   { opacity:.6;cursor:wait; }

    .k-card-body { padding:13px 13px 10px; }
    .k-title-row { display:flex;align-items:flex-start;gap:6px;margin-bottom:8px; }
    .k-card-title { font-size:13px;font-weight:600;color:var(--elm);line-height:1.45;flex:1; }
    .k-card-meta { display:flex;flex-wrap:wrap;gap:4px; }

    .k-card-footer { display:flex;align-items:center;gap:6px;padding:6px 11px;border-top:1px solid var(--olive);background:#FAFEFE; }
    .k-status-dot  { width:7px;height:7px;border-radius:50%;flex-shrink:0; }
    .k-status-text { font-size:10px;font-weight:500;color:var(--gray-txt);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }

    /* ── Add card ────────────────────────────────────────────── */
    .add-card-btn { font-family:'Poppins',sans-serif;font-size:11px;font-weight:500;color:#AAC5C2;background:none;border:1.5px dashed #DDF0EE;border-radius:var(--radius-md);padding:8px 12px;cursor:pointer;width:100%;text-align:left;transition:all var(--t);display:flex;align-items:center;gap:6px; }
    .add-card-btn:hover { border-color:var(--teal);color:var(--pine);background:var(--olive); }
    .add-card-btn svg { width:12px;height:12px;flex-shrink:0; }
    .add-card-btn-top { margin-bottom:8px; }
    .k-vote-btn { display:flex;align-items:center;gap:3px;background:none;border:1.5px solid #E2E8F0;border-radius:20px;font-family:'Poppins',sans-serif;font-size:10px;font-weight:600;color:#94A3B8;padding:3px 8px;cursor:pointer;transition:all var(--t);flex-shrink:0; }
    .k-vote-btn:hover { border-color:var(--teal);color:var(--pine);background:var(--olive); }
    .k-vote-btn.has-votes { border-color:#F59E0B;color:#92400E;background:#FEF3C7; }
    .k-vote-btn svg { width:11px;height:11px; }
    .k-vote-btn:disabled { opacity:.35;cursor:not-allowed;border-color:#E2E8F0;color:#94A3B8;background:none; }
    .k-vote-btn:disabled:hover { border-color:#E2E8F0;color:#94A3B8;background:none;transform:none; }
    .k-card.drop-above { box-shadow:0 -3px 0 var(--teal),var(--shadow-card) !important; }
    .k-card.drop-below { box-shadow:0 3px 0 var(--teal),var(--shadow-card) !important; }
    .k-mes-select { font-family:'Poppins',sans-serif;font-size:9px;font-weight:500;padding:2px 6px;border-radius:10px;background:var(--olive);color:var(--gray-txt);border:1px solid transparent;cursor:pointer;outline:none;max-width:80px; }
    .k-mes-select:hover { border-color:var(--teal);background:#D0EAE8; }
    .k-mes-select:focus { border-color:var(--pine);background:#D0EAE8; }
    .k-similar-panel { border:1.5px solid #F59E0B;border-radius:var(--radius-md);background:#FFFBF0;padding:10px 12px;margin-top:8px;display:flex;flex-direction:column;gap:6px; }
    .k-similar-title { font-size:10px;font-weight:700;color:#92400E;text-transform:uppercase;letter-spacing:.4px; }
    .k-similar-item { display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 8px;background:var(--white);border-radius:6px;border:1px solid #FDE68A; }
    .k-similar-name { font-size:11px;font-weight:500;color:var(--elm);flex:1; }
    .k-similar-arrow-btn { display:flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:6px;background:var(--olive);border:none;cursor:pointer;color:var(--pine);flex-shrink:0;transition:background var(--t); }
    .k-similar-arrow-btn:hover { background:#DDF0EE; }
    .k-similar-arrow-btn svg { width:13px;height:13px; }
    .similar-preview { display:none;flex:1;flex-direction:column;overflow:hidden; }
    .similar-preview.open { display:flex; }
    .modal-card.create-mode.preview-open { width:880px; }
    .modal-card.create-mode.preview-open .modal-right { display:flex; }
    .add-card-form { background:var(--white);border-radius:var(--radius-md);border:1.5px solid var(--teal);padding:10px;display:flex;flex-direction:column;gap:8px;box-shadow:0 2px 12px rgba(0,0,0,.1); }
    .add-card-input { font-family:'Poppins',sans-serif;font-size:12px;font-weight:500;color:var(--elm);border:1.5px solid #DDF0EE;border-radius:var(--radius-sm);padding:8px 10px;outline:none;width:100%; }
    .add-card-input:focus { border-color:var(--pine); }
    .add-card-actions { display:flex;gap:6px; }
    .add-card-confirm { font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;color:var(--white);background:var(--pine);border:none;border-radius:var(--radius-sm);padding:6px 14px;cursor:pointer;flex:1;transition:background var(--t); }
    .add-card-confirm:hover { background:#0A5550; }
    .add-card-confirm:disabled { opacity:.6;cursor:wait; }
    .add-card-cancel { font-family:'Poppins',sans-serif;font-size:11px;color:var(--gray-txt);background:var(--olive);border:none;border-radius:var(--radius-sm);padding:6px 10px;cursor:pointer; }

    /* ─────────────────────────────────────────────────────── */
    /* ── TIMELINE (per-month columns) ────────────────────── */
    /* ─────────────────────────────────────────────────────── */
    .tl-wrapper { background:var(--white);overflow-x:auto;border-top:1px solid #DDF0EE;flex:1;min-height:0; }
    .tl-container { min-width:1000px;height:100%;display:flex;flex-direction:column; }

    /* Header rows */
    .tl-row { display:flex;border-bottom:1px solid #EEF6F5;min-height:46px; }
    .tl-row.tl-sem-row  { min-height:28px;background:#FAFEFE;flex-shrink:0; }
    .tl-row.tl-head-row { border-bottom:2px solid #DDF0EE;min-height:38px;flex-shrink:0; }
    .tl-row.tl-data-row { flex:1;min-height:46px; }
    .tl-row:last-child  { border-bottom:none; }
    .tl-row:nth-child(odd) .tl-data-cell  { background:var(--white); }
    .tl-row:nth-child(even) .tl-data-cell { background:#FAFEFE; }
    .tl-row:nth-child(odd) .tl-pilar-label  { background:var(--white); }
    .tl-row:nth-child(even) .tl-pilar-label { background:#FAFEFE; }

    /* Pilar sticky column */
    .tl-pilar-label { width:150px;flex-shrink:0;padding:8px 12px;border-right:1px solid #DDF0EE;position:sticky;left:0;z-index:6;display:flex;flex-direction:column;justify-content:center;gap:4px; }
    .tl-pilar-name  { font-size:11px;font-weight:600;line-height:1.2; }
    .tl-pilar-count { font-size:9px;font-weight:700;color:var(--white);background:var(--pine);padding:1px 6px;border-radius:10px;display:inline-block;width:fit-content; }

    /* Semester group headers */
    .tl-sem-cell { flex:1;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gray-txt);border-right:1px solid #DDF0EE;padding:4px 6px; }
    .tl-sem-cell.h1-group { flex:6;background:#F5FCFB;border-top:2px solid var(--teal);color:var(--pine); }
    .tl-sem-cell.h2b-group { flex:1;background:#EFF6FF;border-top:2px solid #3B82F6;color:#1D4ED8; }
    .tl-sem-cell.h2-group  { flex:6;background:#F5FFFE;border-top:2px solid var(--fresno);color:#0A6B62; }
    .tl-sem-cell.bl-group  { flex:1;background:#FAFAFA;border-top:2px solid #CBD5E1;color:#64748B;border-right:none; }
    .tl-pilar-sem { width:150px;flex-shrink:0;border-right:1px solid #DDF0EE;position:sticky;left:0;z-index:6;background:#FAFEFE; }

    /* Month header cells */
    .tl-m-head { flex:1;min-width:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 4px;border-right:1px solid #EEF6F5;font-size:9px;font-weight:700;color:#B0BEC5;text-transform:uppercase;letter-spacing:.4px;background:#FAFEFE;cursor:pointer;transition:background var(--t),color var(--t),min-width .22s ease; }
    .tl-m-head:last-child { border-right:none; }
    .tl-m-head:hover { background:#F0FAF9;color:var(--pine); }
    .tl-m-head.h2b { background:#EFF6FF;color:#3B82F6; }
    .tl-m-head.is-today { background:#FFF8F8;color:#DC2626;border-top:3px solid #DC2626; }
    .tl-m-head.is-today .tl-today-tag { font-size:8px;font-weight:700;color:#DC2626;background:#FEE2E2;padding:1px 4px;border-radius:3px; }
    .tl-m-head.tl-col-active { min-width:200px;background:var(--olive) !important;color:var(--pine) !important;border-bottom:2px solid var(--teal);font-size:10px; }

    /* Data cells */
    .tl-data-cell { flex:1;min-width:56px;padding:5px 4px;border-right:1px solid #EEF6F5;display:flex;flex-direction:column;gap:4px;justify-content:center;position:relative;transition:min-width .22s ease,background .15s ease; }
    .tl-data-cell:last-child { border-right:none; }
    .tl-data-cell.h2b  { background:rgba(59,130,246,.03) !important; }
    .tl-data-cell.is-today { background:rgba(220,38,38,.025) !important; }
    .tl-data-cell.tl-col-active { min-width:200px;background:rgba(232,244,243,.45) !important; }

    /* Expanded bars */
    .tl-data-cell.tl-col-active .tl-bar { flex-direction:column;align-items:flex-start;gap:5px;padding:8px 10px;border-radius:var(--radius-md);box-shadow:0 2px 8px rgba(0,0,0,.18); }
    .tl-data-cell.tl-col-active .tl-bar-dot { display:none; }
    .tl-data-cell.tl-col-active .tl-bar-name { white-space:normal;font-size:11px;font-weight:600;line-height:1.35; }
    .tl-bar-extra { display:none;font-size:9px;font-weight:500;color:rgba(255,255,255,.8);line-height:1.3; }
    .tl-data-cell.tl-col-active .tl-bar-extra { display:block; }
    .tl-add-cell-btn { position:absolute;bottom:4px;right:4px;width:18px;height:18px;border-radius:50%;background:var(--teal);border:none;cursor:pointer;color:#fff;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity var(--t),transform var(--t);z-index:2;padding:0; }
    .tl-data-cell:hover .tl-add-cell-btn { opacity:1; }
    .tl-add-cell-btn:hover { transform:scale(1.15);background:var(--pine); }

    /* Timeline bars */
    .tl-bar { display:flex;align-items:center;gap:5px;padding:5px 7px;border-radius:var(--radius-sm);cursor:grab;overflow:hidden;transition:opacity var(--t),transform var(--t),box-shadow var(--t);position:relative; }
    .tl-bar:hover { opacity:.9;transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.18); }
    .tl-bar.tl-dragging { opacity:.3;cursor:grabbing;transform:scale(.95); }
    .tl-bar-dot  { width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.6);flex-shrink:0; }
    .tl-bar-name { font-size:10px;font-weight:500;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1; }

    /* Timeline DnD drop target */

async function importFromAirtable() {
  const params = new URLSearchParams();
  params.set('returnFieldsByFieldId','true');
  Object.values(AT_FIELDS).forEach(id => params.append('fields[]', id));
  let records = [], offset = null;
  do {
    const res = await fetch(AT_URL + '?' + params + (offset ? '&offset=' + offset : ''), { headers: AT_HEADS });
    if (!res.ok) throw new Error(`Airtable ${res.status}`);
    const data = await res.json();
    records = records.concat(data.records || []);
    offset = data.offset || null;
  } while (offset);
  return records.map(r => ({
    id:        r.id,
    nombre:    r.fields[AT_FIELDS.nombre]   || '(sin nombre)',
    estatus:   r.fields[AT_FIELDS.estatus]  || 'Nueva Captura',
    desc:      r.fields[AT_FIELDS.desc]     || '',
    pilar:     r.fields[AT_FIELDS.pilar] ? [r.fields[AT_FIELDS.pilar]] : [],
    prioridad: r.fields[AT_FIELDS.prioridad]|| '',
    semestre:  r.fields[AT_FIELDS.semestre] || 'Backlog',
    mes:       r.fields[AT_FIELDS.mes]      || 'Backlog',
    votes:     0,
    area:      'Diseño',
  }));
}

function genId() { return Date.now().toString(36)+Math.random().toString(36).substr(2,5); }

let _autoSaveTimer = null;
let _isLoading = false;

function scheduleAutoSave() {
  if (_isLoading) return;
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(async () => {
    const token = localStorage.getItem('dinn-gh-token');
    if (!token) return;
    const indicator = document.getElementById('autosave-indicator');
    if (indicator) { indicator.textContent = '↑ Guardando…'; indicator.style.opacity = '1'; }
    try {
      const getRes = await fetch(GH_API, { headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' } });
      const sha = getRes.ok ? (await getRes.json()).sha : undefined;
      const json  = JSON.stringify(allProjects, null, 2);
      const bytes = new TextEncoder().encode(json);
      const b64   = btoa(String.fromCharCode(...bytes));
      const body  = { message: `Auto-save — ${new Date().toLocaleString('es-MX')}`, content: b64 };
      if (sha) body.sha = sha;
      const putRes = await fetch(GH_API, {
        method: 'PUT',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github+json' },
        body: JSON.stringify(body)
      });
      if (!putRes.ok && putRes.status === 401) localStorage.removeItem('dinn-gh-token');
      if (indicator) { indicator.textContent = '✓ Guardado'; setTimeout(() => { indicator.style.opacity = '0'; }, 2000); }
    } catch(e) {
      if (indicator) { indicator.textContent = '⚠ Sin conexión'; setTimeout(() => { indicator.style.opacity = '0'; }, 3000); }
    }
  }, 2000);
}

let searchQuery        = '';
let currentView        = 'cards';
let modalMode          = 'view';   // 'view' | 'create'
let createContext      = { mes: null, pilar: '' };
let modalId      = null;

// ── Utils ───────────────────────────────────────────────────
function showToast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => { el.style.animation='slideOut .25s ease forwards'; setTimeout(()=>el.remove(),260); }, 3500);
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

function prioridadClass(p) {
  if (!p) return '';
  const l = p.toLowerCase();
  if (l.includes('alta'))  return 'badge-prioridad-alta';
  if (l.includes('media')) return 'badge-prioridad-media';
  return 'badge-prioridad-baja';
}

function slugify(s) { return s.replace(/[^a-zA-Z0-9]/g,'-'); }

// Bucket de display: usa mes específico si existe, H2 sin mes si semestre=H2, Backlog si no
function getDisplayBucket(proj) {
  if (H1_MONTHS.has(proj.mes)) return proj.mes;
  if (H2_MONTHS.has(proj.mes)) return proj.mes;
  if (proj.semestre === 'H2 2026') return 'H2 sin mes';
  return 'Backlog';
}

function getSemestreFromBucket(bucket) {
  if (H1_MONTHS.has(bucket)) return 'H1 2026';
  if (H2_MONTHS.has(bucket) || bucket === 'H2 sin mes') return 'H2 2026';
  return 'Backlog';
}

// ── Métricas ────────────────────────────────────────────────
function updateMetrics(projects) {
  document.getElementById('m-total').textContent      = projects.length;
  document.getElementById('m-backlog').textContent    = projects.filter(p=>STATUS_GROUPS['Backlog'].statuses.includes(p.estatus)).length;
  document.getElementById('m-todo').textContent       = projects.filter(p=>STATUS_GROUPS['To-do'].statuses.includes(p.estatus)).length;
  document.getElementById('m-inprogress').textContent = projects.filter(p=>STATUS_GROUPS['En desarrollo'].statuses.includes(p.estatus)).length;
  document.getElementById('m-done').textContent       = projects.filter(p=>STATUS_GROUPS['Completado'].statuses.includes(p.estatus)).length;
}

// ── Carga de datos ───────────────────────────────────────────
async function loadProjects() {
  _isLoading = true;
  const btn = document.getElementById('sync-btn');
  if (btn) btn.classList.add('spinning');
  try {
    // 1. Intentar GitHub raw
    const res = await fetch(GH_RAW + '?t=' + Date.now());
    if (res.ok) {
      allProjects = await res.json();
      saveLocal();
    } else throw new Error('no gh');
  } catch {
    // 2. Fallback: localStorage
    const stored = localStorage.getItem(LS_KEY);
    if (stored) {
      allProjects = JSON.parse(stored);
    } else {
      // 3. Migración desde Airtable (primera vez)
      try {
        allProjects = await importFromAirtable();
        saveLocal();
        showToast('✓ Datos importados desde Airtable', 'success');
      } catch(e) {
        allProjects = [];
        showToast('No se pudieron cargar los proyectos', 'error');
      }
    }
  }
  // Normalizar datos: garantizar tipos correctos en todos los campos
  let dataNeedsResave = false;
  allProjects = allProjects.map(p => {
    // Flatten pilar: Airtable devuelve array, pero importFromAirtable lo envolvía en otro array
    let pilar = p.pilar;
    if (!Array.isArray(pilar)) {
      pilar = pilar ? [pilar] : [];
      dataNeedsResave = true;
    } else {
      // Aplanar si algún elemento es array (bug de anidación)
      const flat = pilar.flatMap(x => Array.isArray(x) ? x : [x]).filter(x => x && typeof x === 'string');
      if (flat.length !== pilar.length || flat.some((v,i) => v !== pilar[i])) {
        pilar = flat;
        dataNeedsResave = true;
      }
    }
    // Normalize area: always array
    let area = p.area;
    if (!Array.isArray(area)) { area = area ? [area] : []; dataNeedsResave = true; }
    return {
      ...p,
      nombre:    (p.nombre && p.nombre !== 'undefined')   ? String(p.nombre)    : '(sin nombre)',
      estatus:   p.estatus   ? String(p.estatus)   : 'Nueva Captura',
      desc:      p.desc      ? String(p.desc)      : '',
      pilar,
      area,
      prioridad: p.prioridad ? String(p.prioridad) : '',
      semestre:  p.semestre  ? String(p.semestre)  : 'Backlog',
      mes:       p.mes       ? String(p.mes)       : 'Backlog',
      votes:     typeof p.votes === 'number' ? p.votes : 0,
    };
  });
  if (dataNeedsResave) saveLocal(); // persistir data limpia

  // Inyectar DATA_PATCHES que no existen aún; actualizar campos nuevos en existentes
  let patchesChanged = false;
  DATA_PATCHES.forEach(patch => {
    const existing = allProjects.find(p => p.id === patch.id);
    if (!existing) {
      allProjects.push(patch);
      patchesChanged = true;
    } else {
      // Propagar campos nuevos (como `area`) sin sobreescribir edits del usuario
      ['area'].forEach(field => {
        if (existing[field] === undefined && patch[field] !== undefined) {
          existing[field] = patch[field];
          patchesChanged = true;
        }
      });
    }
  });
  if (patchesChanged) saveLocal();

  updateMetrics(allProjects);
  renderProjects();
  if (btn) btn.classList.remove('spinning');
  _isLoading = false;
}

// ── Filtros & vista ──────────────────────────────────────────
function setFilter(pilar) {
  activeFilter = pilar;
  document.querySelectorAll('.pill[data-pilar]').forEach(b => b.classList.toggle('active', b.dataset.pilar===pilar));
  renderProjects();
}

function setAreaFilter(area) {
  activeAreaFilter = area;
  document.querySelectorAll('.pill[data-area]').forEach(b => b.classList.toggle('active', b.dataset.area===area));
  renderProjects();
}

function setStatusFilter(status) {
  activeStatusFilter = status;
  document.querySelectorAll('.pill[data-status]').forEach(b => b.classList.toggle('active', b.dataset.status===status));
  document.getElementById('metric-total').classList.toggle('active',      status==='Todos');
  document.getElementById('metric-backlog').classList.toggle('active',    status==='Backlog');
  document.getElementById('metric-todo').classList.toggle('active',       status==='To-do');
  document.getElementById('metric-inprogress').classList.toggle('active', status==='En desarrollo');
  document.getElementById('metric-done').classList.toggle('active',       status==='Completado');
  renderProjects();
}

function setSearchQuery(val) {
  searchQuery = val.trim().toLowerCase();
  const clearBtn = document.getElementById('search-clear');
  if (clearBtn) clearBtn.style.display = searchQuery ? '' : 'none';
  renderProjects();
}
function clearSearch() {
  searchQuery = '';
  const input = document.getElementById('search-input');
  if (input) input.value = '';
  const clearBtn = document.getElementById('search-clear');
  if (clearBtn) clearBtn.style.display = 'none';
  renderProjects();
}

function filteredProjects() {
  let list = activeFilter==='Todos' ? allProjects : allProjects.filter(p=>p.pilar.includes(activeFilter));
  if (activeAreaFilter !== 'Todos') list = list.filter(p => { const a = Array.isArray(p.area) ? p.area : (p.area ? [p.area] : []); return a.includes(activeAreaFilter); });
  if (searchQuery) list = list.filter(p => (p.nombre||'').toLowerCase().includes(searchQuery) || (p.desc||'').toLowerCase().includes(searchQuery));
  if (activeStatusFilter === 'Todos') return list;
  // Grupos
  if (STATUS_GROUPS[activeStatusFilter]) return list.filter(p=>STATUS_GROUPS[activeStatusFilter].statuses.includes(p.estatus));
  // Estatus exacto
  return list.filter(p => p.estatus === activeStatusFilter);
}

function setView(view) {
  currentView = view;
  document.getElementById('btn-timeline').classList.toggle('active', view==='timeline');
  document.getElementById('btn-cards').classList.toggle('active',   view==='cards');
  renderProjects();
}

function renderProjects() {
  if (currentView==='timeline') renderTimeline();
  else renderKanban();
}

// ─────────────────────────────────────────────────────────────
// ── KANBAN ───────────────────────────────────────────────────
// ─────────────────────────────────────────────────────────────

function renderKanban() {
  const main = document.getElementById('main-content');
  main.classList.remove('tl-view');
  const projects = filteredProjects();
  if (!projects.length) { main.innerHTML='<div class="state-box"><span>No hay proyectos con estos filtros.</span></div>'; return; }

  const byGroup = {};
  STATUS_GROUP_ORDER.forEach(g => byGroup[g] = []);
  for (const p of projects) byGroup[getStatusGroup(p.estatus)].push(p);
  byGroup['Backlog'].sort((a,b) => (b.votes||0) - (a.votes||0));

  let html = '<div class="kanban-board status-board" id="kanban-board">';
  for (const group of STATUS_GROUP_ORDER) {
    const cfg   = STATUS_GROUPS[group];
    const cards = byGroup[group];
    const defaultSt = cfg.statuses[0];
    html += `
      <div class="kanban-col">
        <div class="kanban-head" style="border-top:3px solid ${cfg.color}">
          <span class="kanban-month" style="color:${cfg.text}">${group}</span>
          <span class="kanban-cnt" id="cnt-sg-${slugify(group)}" style="background:${cfg.bg};color:${cfg.text}">${cards.length}</span>
        </div>
        <div class="kanban-scroll-area">
          ${group === 'Backlog' ? `<button class="add-card-btn add-card-btn-top" onclick="openNewProjectModal(null,'','${defaultSt}')"><svg viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg> Agregar proyecto</button>` : ''}
          <div class="kanban-body" data-group="${group}" id="sgbody-${slugify(group)}">
            ${group === 'Completado' ? renderCompletadoCards(cards) : group === 'To-do' ? renderCardsByMonth(cards, false) : cards.map(p=>renderKCard(p)).join('')}
          </div>
        </div>
      </div>`;
  }
  html += '</div>';
  main.innerHTML = html;
  setupStatusDnD();
  cleanEmptyMonthDividers();
}

function renderCardsByMonth(cards, descending = true) {
  const monthOrder = descending ? [...MONTHS].reverse() : [...MONTHS];
  const byMonth = {};
  for (const p of cards) {
    const bucket = getDisplayBucket(p);
    if (!byMonth[bucket]) byMonth[bucket] = [];
    byMonth[bucket].push(p);
  }
  let html = '';
  for (const month of monthOrder) {
    if (!byMonth[month] || !byMonth[month].length) continue;
    const label = month === 'H2 sin mes' ? '2do Semestre' : month === 'Backlog' ? 'Sin mes' : month;
    html += `<div class="completado-month-divider" data-mes="${month}">${label}</div>`;
    html += byMonth[month].map(p => renderKCard(p)).join('');
  }
  return html;
}
function renderCompletadoCards(cards) { return renderCardsByMonth(cards, true); }

function voteProject(id) {
  const proj = allProjects.find(p => p.id === id);
  if (!proj) return;
  proj.votes = Math.min((proj.votes || 0) + 1, 999);
  saveLocal();
  // Re-render backlog column in place
  const body = document.getElementById('sgbody-Backlog');
  if (body) {
    const backlogCards = filteredProjects().filter(p => getStatusGroup(p.estatus) === 'Backlog')
      .sort((a,b) => (b.votes||0) - (a.votes||0));
    body.innerHTML = backlogCards.map(p => renderKCard(p)).join('');
    setupStatusDnD();
  }
  const cnt = document.getElementById('cnt-sg-Backlog');
  if (cnt) cnt.textContent = allProjects.filter(p=>getStatusGroup(p.estatus)==='Backlog').length;
}

function renderKCard(p) {
  const gc = STATUS_GROUPS[getStatusGroup(p.estatus)] || STATUS_GROUPS['Backlog'];
  const pilarArr = Array.isArray(p.pilar) ? p.pilar : (p.pilar ? [p.pilar] : []);
  const pilarBadges = pilarArr.map(pi => {
    const c = PILAR_COLORS[pi]||{bg:'#F1F5F9',text:'#475569'};
    return `<span class="badge" data-pilar="${pi}" style="background:${c.bg};color:${c.text};font-size:9px;padding:2px 7px">${pi}</span>`;
  }).join('');
  const statusBadge = `<span class="k-status-badge" style="background:${gc.bg};color:${gc.text}">${p.estatus}</span>`;
  const areaArr = Array.isArray(p.area) ? p.area : (p.area ? [p.area] : []);
  const areaBadge = areaArr.map(a => { const info = AREA_COLORS[a]; return info ? `<span class="badge" title="${a}" style="background:${info.bg};color:${info.text};font-size:9px;padding:2px 7px">${info.emoji} ${a}</span>` : ''; }).join('');
  const linkBadge = p.link ? `<a class="k-link-badge" href="${escapeHtml(p.link)}" target="_blank" rel="noopener" title="${escapeHtml(p.link)}" onclick="event.stopPropagation()"><svg viewBox="0 0 13 13" fill="none"><path d="M5 2H2a1 1 0 00-1 1v8a1 1 0 001 1h8a1 1 0 001-1V8M8 1h4m0 0v4m0-4L5.5 7.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></a>` : '';
  const bucket = getDisplayBucket(p);
  // Mes de salida (solo lectura en card; editable desde el modal)
  const mesLabel = bucket === 'H2 sin mes' ? '2do Sem' : bucket !== 'Backlog' ? bucket.split(' ')[0] : '';
  const mesSelect = mesLabel ? `<span class="k-mes-badge">${mesLabel}</span>` : '';
  return `
    <div class="k-card" id="kcard-${p.id}" data-id="${p.id}" draggable="true" onclick="handleCardClick(event,'${p.id}')">
      <div class="k-card-body">
        <div class="k-card-title" id="ktitle-${p.id}">${escapeHtml(p.nombre)}</div>
        <div class="k-card-meta" style="display:flex;align-items:center;justify-content:space-between;gap:4px;flex-wrap:nowrap;margin-top:6px">
          <div style="display:flex;gap:4px;flex-wrap:wrap">${pilarBadges}</div>
          <div style="display:flex;gap:4px;align-items:center;flex-shrink:0">${linkBadge}${areaBadge}</div>
        </div>
      </div>
    </div>`;
}

// ── Limpiar dividers de mes sin cards ────────────────────────
function cleanEmptyMonthDividers() {
  document.querySelectorAll('.completado-month-divider').forEach(divider => {
    let next = divider.nextElementSibling;
    let hasCard = false;
    while (next && !next.classList.contains('completado-month-divider')) {
      if (next.classList.contains('k-card')) { hasCard = true; break; }
      next = next.nextElementSibling;
    }
    if (!hasCard) divider.remove();
  });
}

// ── Mes inline desde card ────────────────────────────────────
function cardMesChange(e, id) {
  const newMes = e.target.value;
  const proj = allProjects.find(p => p.id === id);
  if (!proj) return;
  proj.mes      = newMes || 'Backlog';
  proj.semestre = newMes ? (H1_MONTHS.has(newMes) ? 'H1 2026' : 'H2 2026') : 'Backlog';
  saveLocal();
  showToast(`✓ Mes: ${newMes || 'Sin mes'}`, 'success');
}

// ── Drag & Drop ──────────────────────────────────────────────
let wasDragging = false;

function handleCardClick(e, id) {
  if (wasDragging) { wasDragging = false; return; }
  openModal(id);
}

function setupDnD() {
  document.querySelectorAll('.k-card').forEach(card => {
    card.addEventListener('dragstart', e => {
      dragSrc = card.dataset.id;
      wasDragging = true;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', dragSrc);
      requestAnimationFrame(() => card.classList.add('is-dragging'));
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('is-dragging');
      document.querySelectorAll('.kanban-body').forEach(b => b.classList.remove('drag-over'));
      dragSrc = null;
      setTimeout(() => { wasDragging = false; }, 50);
    });
  });
  document.querySelectorAll('.kanban-body').forEach(body => {
    body.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect='move'; body.classList.add('drag-over'); });
    body.addEventListener('dragleave', e => { if (!body.contains(e.relatedTarget)) body.classList.remove('drag-over'); });
    body.addEventListener('drop', e => {
      e.preventDefault();
      body.classList.remove('drag-over');
      const id = dragSrc || e.dataTransfer.getData('text/plain');
      if (!id) return;
      const newBucket = body.dataset.mes;
      const proj = allProjects.find(p => p.id===id);
      if (!proj || getDisplayBucket(proj)===newBucket) return;
      const prevBucket = getDisplayBucket(proj);
      const cardEl = document.getElementById(`kcard-${id}`);
      if (cardEl) body.appendChild(cardEl);
      if (newBucket==='H2 sin mes') { proj.mes='Backlog'; proj.semestre='H2 2026'; }
      else if (newBucket==='Backlog') { proj.mes='Backlog'; proj.semestre='Backlog'; }
      else { proj.mes=newBucket; }
      refreshKanbanCounts();
      patchMes(id, newBucket, prevBucket, proj);
    });
  });
}

function refreshKanbanCounts() {
  // Status-board counts
  document.querySelectorAll('.kanban-body[data-group]').forEach(body => {
    const cnt = document.getElementById(`cnt-sg-${slugify(body.dataset.group)}`);
    if (cnt) cnt.textContent = body.querySelectorAll('.k-card').length;
  });
}

function clearDropIndicators() {
  document.querySelectorAll('.k-card.drop-above,.k-card.drop-below').forEach(c => {
    c.classList.remove('drop-above','drop-below');
  });
}

function persistColumnOrder(body) {
  const orderedIds = [...body.querySelectorAll('.k-card')].map(c => c.dataset.id);
  if (!orderedIds.length) return;
  const idSet = new Set(orderedIds);
  const ordered = orderedIds.map(id => allProjects.find(p => p.id === id)).filter(Boolean);
  let i = 0;
  allProjects = allProjects.map(p => idSet.has(p.id) ? ordered[i++] : p);
  saveLocal();
}

// ── DnD por grupo de estatus ──────────────────────────────────
function setupStatusDnD() {
  document.querySelectorAll('.k-card').forEach(card => {
    card.addEventListener('dragstart', e => {
      dragSrc = card.dataset.id; wasDragging = true;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', dragSrc);
      requestAnimationFrame(() => card.classList.add('is-dragging'));
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('is-dragging');
      clearDropIndicators();
      document.querySelectorAll('.kanban-body').forEach(b => b.classList.remove('drag-over'));
      dragSrc = null;
      setTimeout(() => { wasDragging = false; }, 50);
    });
    // Within-column reorder (Completado is locked — no drag reorder)
    card.addEventListener('dragover', e => {
      const id = dragSrc;
      if (!id || id === card.dataset.id) return;
      const srcCard = document.getElementById(`kcard-${id}`);
      if (!srcCard) return;
      const body = card.closest('.kanban-body');
      if (!body || srcCard.closest('.kanban-body') !== body) return;
      if (body.dataset.group === 'Completado') return; // locked
      e.preventDefault();
      e.stopPropagation();
      clearDropIndicators();
      const mid = card.getBoundingClientRect().top + card.getBoundingClientRect().height / 2;
      card.classList.add(e.clientY < mid ? 'drop-above' : 'drop-below');
    });
    card.addEventListener('dragleave', e => {
      if (!card.contains(e.relatedTarget)) card.classList.remove('drop-above','drop-below');
    });
    card.addEventListener('drop', e => {
      const id = dragSrc || e.dataTransfer.getData('text/plain');
      if (!id || id === card.dataset.id) return;
      const srcCard = document.getElementById(`kcard-${id}`);
      if (!srcCard) return;
      const body = card.closest('.kanban-body');
      if (!body || srcCard.closest('.kanban-body') !== body) return;
      if (body.dataset.group === 'Completado') return; // locked
      e.preventDefault();
      e.stopPropagation();
      clearDropIndicators();
      body.classList.remove('drag-over');
      const mid = card.getBoundingClientRect().top + card.getBoundingClientRect().height / 2;
      if (e.clientY < mid) body.insertBefore(srcCard, card);
      else body.insertBefore(srcCard, card.nextSibling);
      // For To-do: update proj.mes to match the month zone the card landed in
      if (body.dataset.group === 'To-do') {
        const proj = allProjects.find(p => p.id === id);
        if (proj) {
          let prev = srcCard.previousElementSibling;
          while (prev && !prev.classList.contains('completado-month-divider')) prev = prev.previousElementSibling;
          if (prev?.dataset.mes) {
            const newMes = prev.dataset.mes;
            if (proj.mes !== newMes) {
              proj.mes = newMes === 'H2 sin mes' ? 'Backlog' : newMes;
              proj.semestre = H1_MONTHS.has(newMes) ? 'H1 2026' : 'H2 2026';
              saveLocal();
            }
          }
        }
      }
      persistColumnOrder(body);
      refreshKanbanCounts();
    });
  });
  document.querySelectorAll('.kanban-body[data-group]').forEach(body => {
    body.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect='move'; body.classList.add('drag-over'); });
    body.addEventListener('dragleave', e => { if (!body.contains(e.relatedTarget)) body.classList.remove('drag-over'); });
    body.addEventListener('drop', e => {
      e.preventDefault();
      body.classList.remove('drag-over');
      const id = dragSrc || e.dataTransfer.getData('text/plain');
      if (!id) return;
      const newGroup = body.dataset.group;
      const proj = allProjects.find(p => p.id === id);
      if (!proj) return;
      const prevGroup = getStatusGroup(proj.estatus);
      if (prevGroup === newGroup) return;  // mismo grupo, no hacer nada

      // Nuevo estatus = primer estatus del grupo destino
      const newEstatus = STATUS_GROUPS[newGroup].statuses[0];
      const prevEstatus = proj.estatus;

      // Actualizar local + badge
      proj.estatus = newEstatus;

      // Completado re-renders fully to place card in correct month section
      if (newGroup === 'Completado' || prevGroup === 'Completado') {
        saveLocal();
        updateMetrics(allProjects);
        renderKanban();
        showToast(`✓ Movido a ${newGroup}`, 'success');
        return;
      }

      // Mover card en DOM
      const cardEl = document.getElementById(`kcard-${id}`);
      if (cardEl) body.appendChild(cardEl);
      refreshKanbanCounts();
      cleanEmptyMonthDividers();
      const gc = STATUS_GROUPS[newGroup];
      const badge = cardEl?.querySelector('.k-status-badge');
      if (badge) { badge.style.background=gc.bg; badge.style.color=gc.text; badge.textContent=newEstatus; }
      // Rocket: habilitar si vuelve a Backlog, deshabilitar si sale
      const rocketBtn = cardEl?.querySelector('.k-vote-btn');
      if (rocketBtn) {
        if (newGroup === 'Backlog') {
          rocketBtn.disabled = false;
          rocketBtn.title = '';
          rocketBtn.onclick = (ev) => { ev.stopPropagation(); voteProject(id); };
        } else {
          rocketBtn.disabled = true;
          rocketBtn.title = 'Ya avanzó en el proceso';
          rocketBtn.onclick = null;
        }
      }
      updateMetrics(allProjects);

      // Guardar localmente
      saveLocal();
      showToast(`✓ Movido a ${newGroup}`,'success');
    });
  });
}

// ── Mover mes (local) ─────────────────────────────────────────
function patchMes(recordId, newBucket, prevBucket, proj) {
  saveLocal();
  showToast(`✓ Movido a ${newBucket==='H2 sin mes'?'Segundo Semestre':newBucket}`,'success');
}

function wordSimilarity(a, b) {
  const stopwords = new Set(['de','el','la','los','las','un','una','en','con','para','por','del','y','a','al','es','se']);
  const wordsA = a.toLowerCase().split(/\s+/).filter(w => w.length > 2 && !stopwords.has(w));
  const wordsB = b.toLowerCase().split(/\s+/).filter(w => w.length > 2 && !stopwords.has(w));
  if (!wordsA.length || !wordsB.length) return 0;
  const matches = wordsA.filter(w => wordsB.some(wb => wb.includes(w) || w.includes(wb)));
  return matches.length / Math.min(wordsA.length, wordsB.length);
}

function checkSimilarProjects(input) {
  const panel = document.getElementById('similar-panel');
  if (!panel) return;
  const trimmed = input.trim();
  if (trimmed.length < 4) { panel.style.display = 'none'; return; }
  const candidates = allProjects.filter(p =>
    getStatusGroup(p.estatus) !== 'Backlog' &&
    wordSimilarity(trimmed, p.nombre) >= 0.4
  ).slice(0, 3);
  if (!candidates.length) { panel.style.display = 'none'; return; }
  panel.style.display = '';
  panel.innerHTML = `
    <div class="k-similar-title">⚠️ Proyectos similares en curso</div>
    ${candidates.map(p => {
      const gc = STATUS_GROUPS[getStatusGroup(p.estatus)];
      return `<div class="k-similar-item">
        <div class="k-similar-name">${escapeHtml(p.nombre)}</div>
        <span class="k-status-badge" style="background:${gc.bg};color:${gc.text};font-size:9px">${p.estatus}</span>
        <button class="k-similar-arrow-btn" onclick="openSimilarPreview('${p.id}')" title="Ver detalles">
          <svg viewBox="0 0 13 13" fill="none"><path d="M2 6.5h9M7 2l4.5 4.5L7 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>`;
    }).join('')}`;
}

function createProject() {
  const nameInput = document.getElementById('modal-new-name');
  const name = nameInput?.value.trim();
  if (!name) {
    nameInput?.classList.add('modal-name-error');
    nameInput?.focus();
    setTimeout(() => nameInput?.classList.remove('modal-name-error'), 1200);
    return;
  }

  const estatus  = document.getElementById('modal-select').value || 'Nueva Captura';
  const pilar    = document.getElementById('modal-pilar-select').value || null;
  const desc     = document.getElementById('modal-new-desc')?.value.trim() || null;
  const mesVal   = document.getElementById('modal-mes-select')?.value || '';
  const mes      = mesVal || createContext.mes || null;
  const link     = document.getElementById('modal-link-input')?.value.trim() || null;

  const btn = document.getElementById('modal-create-btn');
  btn.disabled = true; btn.textContent = 'Creando…';

  const sem = getSemestreFromBucket(mes || 'Backlog');
  const newProj = {
    id:        genId(),
    nombre:    name,
    estatus,
    desc:      desc || '',
    pilar:     pilar ? [pilar] : [],
    area:      _selectedAreas.length ? [..._selectedAreas] : [],
    prioridad: '',
    semestre:  sem,
    mes:       (mes && mes !== 'H2 sin mes' && mes !== 'Backlog') ? mes : 'Backlog',
    link:      link || null,
  };
  allProjects.push(newProj);
  saveLocal();
  // Transferir adjuntos temporales al ID real
  const attachSection = document.getElementById('modal-attach-section');
  const tempId = attachSection?.dataset.tempId;
  if (tempId) {
    const tempAttach = getAttachments(tempId);
    if (tempAttach.length) { saveAttachments(newProj.id, tempAttach); localStorage.removeItem(ATTACH_NS + tempId); }
  }
  updateMetrics(allProjects);
  closeModal();
  renderProjects();
  showToast(`✓ Proyecto creado: ${name}`, 'success');
}

  const form = document.querySelector(`.add-card-form[data-mes="${mes}"]`);
  form?.remove();
  const btn = document.getElementById(`addbtn-${slugify(mes)}`);
  if (btn) btn.style.display='';

function submitNewCard(mes) {
  const input   = document.getElementById(`addinput-${slugify(mes)}`);
  const confirm = document.getElementById(`addconfirm-${slugify(mes)}`);
  if (!input) return;
  const name = input.value.trim();
  if (!name) { input.focus(); return; }

  input.disabled = confirm.disabled = true;
  const sem = getSemestreFromBucket(mes);

  try {
    const newMes = (mes!=='H2 sin mes' && mes!=='Backlog') ? mes : 'Backlog';
    const newProj = { id:genId(), nombre:name, estatus:'Nueva Captura', desc:'', pilar:[], prioridad:'', semestre:sem, mes:newMes };
    allProjects.push(newProj);
    saveLocal();
    updateMetrics(allProjects);

    // Inject card into DOM before the form
    const body = document.getElementById(`body-${slugify(mes)}`);
    const form = document.querySelector(`.add-card-form[data-mes="${mes}"]`);
    const tmp  = document.createElement('div');
    tmp.innerHTML = renderKCard(newProj);
    const cardEl = tmp.firstElementChild;
    if (body && form) body.insertBefore(cardEl, form);

    // Attach DnD to new card
    cardEl.addEventListener('dragstart', e => {
      dragSrc = cardEl.dataset.id;
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',dragSrc);
      requestAnimationFrame(()=>cardEl.classList.add('is-dragging'));
    });
    cardEl.addEventListener('dragend', () => {
      cardEl.classList.remove('is-dragging');
      document.querySelectorAll('.kanban-body').forEach(b=>b.classList.remove('drag-over'));
      dragSrc = null;
    });

    cancelAddCard(mes);
    refreshKanbanCounts();
    showToast(`✓ Proyecto creado`,'success');
  } catch(err) {
    input.disabled = confirm.disabled = false;
    input.focus();
    showToast(`Error al crear proyecto`,'error');
  }
}

function renderTimeline() {
  const main = document.getElementById('main-content');
  main.classList.add('tl-view');
  const projects = filteredProjects();
  if (!projects.length) { main.innerHTML='<div class="state-box"><span>No hay proyectos con estos filtros.</span></div>'; return; }

  const pilaresToShow = activeFilter==='Todos' ? PILARES_ORDER : [activeFilter];

  // Group by pilar × bucket
  const data = {};
  for (const pi of pilaresToShow) { data[pi]={}; MONTHS.forEach(m=>data[pi][m]=[]); }
  for (const p of projects) {
    const bucket = getDisplayBucket(p);
    const pPilar = Array.isArray(p.pilar) ? p.pilar : (p.pilar ? [p.pilar] : []);
    for (const pi of pPilar.filter(x=>pilaresToShow.includes(x))) {
      if (!data[pi]) continue;
      (data[pi][bucket]=data[pi][bucket]||[]).push(p);
    }
  }

  // Helper to get cell classes
  function cellClass(m, extra='') {
    let c = extra;
    if (m===CURRENT_MONTH) c+=' is-today';
    if (m==='H2 sin mes')  c+=' h2b';
    return c.trim();
  }

  // Semester group header
  const semRow = `
    <div class="tl-row tl-sem-row">
      <div class="tl-pilar-sem"></div>
      <div class="tl-sem-cell h1-group">H1 2026</div>
      <div class="tl-sem-cell h2b-group">2do Sem.</div>
      <div class="tl-sem-cell h2-group">H2 2026</div>
      <div class="tl-sem-cell bl-group">Backlog</div>
    </div>`;

  // Month header
  const monthCells = MONTHS.map(m => {
    const isToday = m===CURRENT_MONTH;
    const isH2B   = m==='H2 sin mes';
    const isBL    = m==='Backlog';
    const label   = isH2B ? '2do Sem' : isBL ? 'Backlog' : m.slice(0,3).toUpperCase();
    return `<div class="tl-m-head${isToday?' is-today':''}${isH2B?' h2b':''}" data-col="${m}">
      <span>${label}</span>
      ${isToday ? '<span class="tl-today-tag">HOY</span>' : ''}
    </div>`;
  }).join('');

  const headRow = `
    <div class="tl-row tl-head-row">
      <div class="tl-pilar-label" style="background:#F7FBFB">
        <span class="tl-pilar-name" style="color:var(--gray-txt);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px">Pilar</span>
      </div>
      ${monthCells}
    </div>`;

  // Pilar rows
  const pilarRows = pilaresToShow.map(pi => {
    const d = data[pi];
    const total = MONTHS.reduce((s,m)=>s+(d[m]?.length||0),0);
    if (!total) return '';
    const c = PILAR_COLORS[pi]||{text:'#475569'};
    const cells = MONTHS.map(m => {
      const bars = (d[m]||[]).map(p=>`
        <div class="tl-bar" draggable="true" data-id="${p.id}" data-mes="${m}" style="background:${STATUS_GROUPS[getStatusGroup(p.estatus)].color}">
          <span class="tl-bar-dot"></span>
          <span class="tl-bar-name">${escapeHtml(p.nombre)}</span>
          <span class="tl-bar-extra">${escapeHtml(p.estatus)}${p.pilar[0]?' · '+escapeHtml(p.pilar[0]):''}</span>
        </div>`).join('');
      return `<div class="tl-data-cell ${cellClass(m)}" data-mes="${m}" data-pilar="${pi}">
        ${bars}
        <button class="tl-add-cell-btn" title="Agregar proyecto" onclick="openNewProjectModal('${m}','${pi}')">+</button>
      </div>`;
    }).join('');
    return `
      <div class="tl-row tl-data-row">
        <div class="tl-pilar-label">
          <span class="tl-pilar-name" style="color:${c.text}">${pi}</span>
          <span class="tl-pilar-count">${total}</span>
        </div>
        ${cells}
      </div>`;
  }).join('');

  main.innerHTML = `
    <div class="tl-wrapper">
      <div class="tl-container">
        ${semRow}${headRow}${pilarRows}
      </div>
    </div>`;
  setupTimelineDnD();
  setupTlTooltip();
  setupTlColExpand();
}

let activeTlCol = null;

function expandTlCol(col) {
  // Collapse first
  document.querySelectorAll('.tl-m-head.tl-col-active').forEach(el => el.classList.remove('tl-col-active'));
  document.querySelectorAll('.tl-data-cell.tl-col-active').forEach(el => el.classList.remove('tl-col-active'));
  if (!col || col === activeTlCol) { activeTlCol = null; return; }
  activeTlCol = col;
  document.querySelectorAll(`.tl-m-head[data-col="${col}"]`).forEach(el => el.classList.add('tl-col-active'));
  document.querySelectorAll(`.tl-data-cell[data-mes="${col}"]`).forEach(el => el.classList.add('tl-col-active'));
}

function setupTlColExpand() {
  // Month header click → expand/toggle
  document.querySelectorAll('.tl-m-head[data-col]').forEach(head => {
    head.addEventListener('click', e => {
      e.stopPropagation();
      expandTlCol(head.dataset.col);
    });
  });
  // Click anywhere else in wrapper (not a bar / add btn / header) → collapse
  const wrapper = document.querySelector('.tl-wrapper');
  if (!wrapper) return;

let tlDragSrc = null;
let tlWasDragging = false;

function setupTimelineDnD() {
  // Bars — drag source
  document.querySelectorAll('.tl-bar').forEach(bar => {
    bar.addEventListener('dragstart', e => {
      tlDragSrc = bar.dataset.id;
      tlWasDragging = true;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', tlDragSrc);
      requestAnimationFrame(() => bar.classList.add('tl-dragging'));
    });
    bar.addEventListener('dragend', () => {
      bar.classList.remove('tl-dragging');
      document.querySelectorAll('.tl-data-cell').forEach(c => c.classList.remove('tl-drop-over'));
      tlDragSrc = null;
      setTimeout(() => { tlWasDragging = false; }, 50);
    });
    // Click — open modal (only if not dragging)
    bar.addEventListener('click', e => {
      if (tlWasDragging) return;
      openModal(bar.dataset.id);
    });
  });

  // Cells — drop targets
  document.querySelectorAll('.tl-data-cell').forEach(cell => {
    cell.addEventListener('dragover', e => {
      if (!tlDragSrc) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      cell.classList.add('tl-drop-over');
    });
    cell.addEventListener('dragleave', e => {
      if (!cell.contains(e.relatedTarget)) cell.classList.remove('tl-drop-over');
    });
    cell.addEventListener('drop', e => {
      e.preventDefault();
      cell.classList.remove('tl-drop-over');
      const id = tlDragSrc || e.dataTransfer.getData('text/plain');
      if (!id) return;
      const newBucket = cell.dataset.mes;
      const proj = allProjects.find(p => p.id === id);
      if (!proj || !newBucket) return;
      const prevBucket = getDisplayBucket(proj);
      if (prevBucket === newBucket) return;

      // Move bar in DOM
      const barEl = document.querySelector(`.tl-bar[data-id="${id}"]`);
      if (barEl) {
        barEl.dataset.mes = newBucket;
        cell.appendChild(barEl);
      }

      // Update local state
      if (newBucket === 'H2 sin mes') { proj.mes = 'Backlog'; proj.semestre = 'H2 2026'; }
      else if (newBucket === 'Backlog') { proj.mes = 'Backlog'; proj.semestre = 'Backlog'; }
      else {
        proj.mes = newBucket;
        proj.semestre = H1_MONTHS.has(newBucket) ? 'H1 2026' : 'H2 2026';
      }
      patchMes(id, newBucket, prevBucket, proj);
    });
  });
}

// ── Tooltip hover en timeline ─────────────────────────────────
function setupTlTooltip() {
  const tip = document.getElementById('tl-tooltip');
  document.querySelectorAll('.tl-bar').forEach(bar => {
    const proj = allProjects.find(p => p.id === bar.dataset.id);
    if (!proj) return;
    bar.addEventListener('mouseenter', e => {
      tip.textContent = proj.nombre;
      tip.classList.add('visible');
      moveTip(e);
    });
    bar.addEventListener('mousemove', moveTip);
    bar.addEventListener('mouseleave', () => tip.classList.remove('visible'));
  });
  function moveTip(e) {
    const x = e.clientX + 12, y = e.clientY - 36;
    const vw = window.innerWidth, tipW = tip.offsetWidth || 180;
    tip.style.left = (x + tipW > vw ? vw - tipW - 8 : x) + 'px';
    tip.style.top  = (y < 8 ? e.clientY + 16 : y) + 'px';
  }
}

async function updateStatusFromModal(newStatus) {
  if (modalMode === 'create') {
    const color = STATUS_COLORS[newStatus]||'#94A3B8';
    document.getElementById('modal-dot').style.background = color;
    document.getElementById('modal-status-label').textContent = newStatus;
    document.getElementById('modal-select').value = newStatus;
    syncGroupToggle(newStatus);
    renderTodoStepper({ estatus: newStatus });
    return;
  }
  if (!modalId) return;
  const proj = allProjects.find(p=>p.id===modalId);
  if (!proj||newStatus===proj.estatus) return;
  const prevStatus = proj.estatus;
  const spinner=document.getElementById('modal-spinner'),
        dot=document.getElementById('modal-dot'), label=document.getElementById('modal-status-label');
  spinner.style.display='block';
  try {
    proj.estatus=newStatus;
    saveLocal();
    const color=STATUS_COLORS[newStatus]||'#94A3B8';
    dot.style.background=color; label.textContent=newStatus;
    syncGroupToggle(newStatus);
    renderTodoStepper(proj);
    document.querySelector(`.tl-bar[data-id="${modalId}"]`)?.style.setProperty('background',STATUS_GROUPS[getStatusGroup(newStatus)].color);
    const newGc = STATUS_GROUPS[getStatusGroup(newStatus)];
    const kBadge = document.querySelector(`#kcard-${modalId} .k-status-badge`);
    if (kBadge) { kBadge.style.background=newGc.bg; kBadge.style.color=newGc.text; kBadge.textContent=newStatus; }
    const newGroup = getStatusGroup(newStatus);
    const prevGroup = getStatusGroup(prevStatus);
    if (newGroup !== prevGroup) {
      const cardEl = document.getElementById(`kcard-${modalId}`);
      const targetBody = document.querySelector(`.kanban-body[data-group="${newGroup}"]`);
      if (cardEl && targetBody) { targetBody.appendChild(cardEl); refreshKanbanCounts(); cleanEmptyMonthDividers(); }
    }
    updateMetrics(allProjects);
    showToast(`✓ Estatus: ${newStatus}`,'success');
  } catch(err) {
    showToast(`Error: ${err.message}`,'error');
  } finally { spinner.style.display='none'; }
}

// ── To-do stepper (modal) ─────────────────────────────────────

const TODO_STEPS = ['Definición del problema','Validación','Diseño','Lista para sprint'];

function renderTodoStepper(proj) {
  const container = document.getElementById('modal-todo-stepper');
  container.style.display = '';
  const currentIdx = TODO_STEPS.indexOf(proj.estatus);
  // If status is past the To-do phase (En desarrollo, Lanzado), all steps are done
  // If status is before To-do phase (Nueva Captura) or unknown, none are done
  const group = getStatusGroup(proj.estatus);
  let effectiveIdx;
  if (currentIdx >= 0) {
    effectiveIdx = currentIdx; // active step inside the list
  } else if (group === 'En desarrollo' || group === 'Completado') {
    effectiveIdx = TODO_STEPS.length; // all done
  } else {
    effectiveIdx = -1; // none done
  }
  const STEP_LABELS = ['En definición','Validación','Diseño','Lista para Sprint'];
  const stepsHtml = TODO_STEPS.map((s, i) => {
    let cls = '';
    if (i < effectiveIdx) cls = 'done';
    else if (i === effectiveIdx) cls = 'active';
    const inner = i < effectiveIdx ? '✓' : (i + 1);
    const clickable = (getStatusGroup(proj.estatus) === 'To-do' || group === 'Backlog') ? `onclick="clickTodoStep('${s}')"` : '';
    return `<div class="todo-step ${cls}" ${clickable}>
      <div class="todo-step-circle">${inner}</div>
      <div class="todo-step-label">${STEP_LABELS[i]}</div>
    </div>`;
  }).join('');
  container.innerHTML = `<div class="todo-stepper">${stepsHtml}</div>`;
}

async function clickTodoStep(status) {
  if (modalMode === 'create') {
    // In create mode just update the UI via updateStatusFromModal
    await updateStatusFromModal(status);
    const proj = { estatus: status };
    renderTodoStepper(proj);
    return;
  }
  await updateStatusFromModal(status);
  const proj = allProjects.find(p => p.id === modalId);
  if (proj) renderTodoStepper(proj);
}

async function pullFromGitHub() {
  const btn = document.getElementById('pull-btn');
  if (btn) btn.classList.add('spinning');
  try {
    const res = await fetch(GH_RAW + '?t=' + Date.now());
    if (!res.ok) throw new Error(`GitHub ${res.status}`);
    allProjects = await res.json();
    saveLocal();
    updateMetrics(allProjects);
    renderProjects();
    showToast('✓ Sincronizado desde GitHub', 'success');
  } catch(err) {
    showToast(`Error al sincronizar: ${err.message}`, 'error');
  } finally {
    if (btn) btn.classList.remove('spinning');
  }
}

    if (!token) return;
    localStorage.setItem('dinn-gh-token', token.trim());
    token = token.trim();
  }
  const btn = document.getElementById('sync-btn');
  btn.classList.add('spinning');
  try {
    // Obtener SHA actual del archivo (requerido para actualizar)
    const getRes = await fetch(GH_API, { headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' } });
    const sha = getRes.ok ? (await getRes.json()).sha : undefined;

    // Codificar contenido en base64 (compatible con Unicode)
    const json  = JSON.stringify(allProjects, null, 2);
    const bytes = new TextEncoder().encode(json);
    const b64   = btoa(String.fromCharCode(...bytes));

    const body  = { message: `Update roadmap data — ${new Date().toLocaleString('es-MX')}`, content: b64 };
    if (sha) body.sha = sha;

    const putRes = await fetch(GH_API, {
      method: 'PUT',
      headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github+json' },
      body: JSON.stringify(body)
    });
    if (!putRes.ok) {
      const e = await putRes.json().catch(()=>({}));
      if (putRes.status === 401) { localStorage.removeItem('dinn-gh-token'); }
      throw new Error(e.message || `HTTP ${putRes.status}`);
    }
    showToast('✓ Guardado en GitHub', 'success');
  } catch(err) {
    showToast(`Error: ${err.message}`, 'error');
  } finally { btn.classList.remove('spinning'); }
}

document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

function generatePDFReport() {
  const now = new Date();
  const dateStr = now.toLocaleDateString('es-MX', {weekday:'long', day:'numeric', month:'long', year:'numeric'});

  const completado = allProjects.filter(p => getStatusGroup(p.estatus) === 'Completado');
  const enDes      = allProjects.filter(p => getStatusGroup(p.estatus) === 'En desarrollo');
  const todo       = allProjects.filter(p => getStatusGroup(p.estatus) === 'To-do');
  const backlog    = allProjects.filter(p => getStatusGroup(p.estatus) === 'Backlog');

  const ST_COLOR = {
    'Nueva Captura':'#94A3B8','Definición del problema':'#F59E0B','Validación':'#3B82F6',
    'Diseño':'#8B5CF6','Lista para sprint':'#0B645C','En desarrollo':'#27BCB0',
    'Bloqueado':'#DC2626','Lanzado':'#16A34A',
  };

  function projectRow(p, showMes) {
    const pilarArr = Array.isArray(p.pilar) ? p.pilar : (p.pilar ? [p.pilar] : []);
    const color    = ST_COLOR[p.estatus] || '#94A3B8';
    const bucket   = getDisplayBucket(p);
    const mesLabel = bucket === 'H2 sin mes' ? '2do Sem' : bucket === 'Backlog' ? '—' : bucket.split(' ')[0];
    const desc     = p.desc ? String(p.desc).replace(/<br>/g, ' ').trim() : '—';
    return `<tr>
      <td class="col-name">${p.nombre}</td>
      <td><span class="spill" style="background:${color}18;color:${color};border:1px solid ${color}40">${p.estatus}</span></td>
      <td class="col-pilar">${pilarArr.join(', ') || '—'}</td>
      ${showMes ? `<td class="col-mes">${mesLabel}</td>` : ''}
      <td class="col-desc">${desc}</td>
    </tr>`;
  }

  // Completado agrupado por mes desc
  const compByMonth = {};
  completado.forEach(p => {
    const b = getDisplayBucket(p);
    const lbl = b === 'H2 sin mes' ? '2do Semestre' : b === 'Backlog' ? 'Sin mes' : b;
    (compByMonth[lbl] = compByMonth[lbl] || []).push(p);
  });
  const monthOrderDesc = [...MONTHS].reverse().map(m =>
    m === 'H2 sin mes' ? '2do Semestre' : m === 'Backlog' ? 'Sin mes' : m
  );
  let completadoRows = '';
  for (const lbl of monthOrderDesc) {
    if (!compByMonth[lbl] || !compByMonth[lbl].length) continue;
    completadoRows += `<tr class="month-row"><td colspan="4">${lbl}</td></tr>`;
    completadoRows += compByMonth[lbl].map(p => projectRow(p, false)).join('');
  }

  let enCursoRows = '';
  if (enDes.length) {
    enCursoRows += `<tr class="group-sep"><td colspan="5">En desarrollo</td></tr>`;
    enCursoRows += enDes.map(p => projectRow(p, true)).join('');
  }
  if (todo.length) {
    enCursoRows += `<tr class="group-sep" style="color:#92400E;background:#FFFBF0;border-color:#FDE68A"><td colspan="5">To-do</td></tr>`;
    enCursoRows += todo.map(p => projectRow(p, true)).join('');
  }

  const backlogRows = [...backlog].sort((a,b)=>(b.votes||0)-(a.votes||0))
    .map(p => projectRow(p, false)).join('');

  const html = `<!DOCTYPE html>

// ── Anotaciones ─────────────────────────────────────────────
const NOTES_NS = 'dinn-notes-';

function getNotes(projectId) {
  try { return JSON.parse(localStorage.getItem(NOTES_NS + projectId) || '[]'); }
  catch { return []; }
}
function saveNotes(projectId, notes) {
  localStorage.setItem(NOTES_NS + projectId, JSON.stringify(notes));
}

function formatNoteDate(ts) {
  const d = new Date(ts);
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}, ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

let _noteTimers = [];

function renderNotes(projectId) {
  const container = document.getElementById('modal-notes-list');
  const countEl   = document.getElementById('notes-panel-count');
  if (!container) return;
  _noteTimers.forEach(t => clearTimeout(t));
  _noteTimers = [];

  const notes = getNotes(projectId).slice().sort((a, b) => b.createdAt - a.createdAt);
  if (countEl) countEl.textContent = notes.length || '';

  if (notes.length === 0) {
    container.innerHTML = '<p class="notes-empty">Sin anotaciones aún.</p>';
    return;
  }

  const EDIT_WINDOW = 5 * 60 * 1000;
  const now = Date.now();

  container.innerHTML = notes.map(n => {
    const canEdit = (now - n.createdAt) < EDIT_WINDOW;
    const editedStr = n.editedAt ? ` <span class="note-edited">· editado</span>` : '';
    const editBtn = canEdit
      ? `<button class="note-edit-btn" onclick="startEditNote('${n.id}','${projectId}')">Editar</button>`
      : '';
    return `<div class="note-item" id="note-${n.id}">
      <div class="note-meta">
        <span class="note-date">${formatNoteDate(n.createdAt)}${editedStr}</span>
        ${editBtn}
      </div>
      <div class="note-body" id="note-body-${n.id}">${escapeHtml(n.text).replace(/\n/g,'<br>')}</div>
    </div>`;
  }).join('');

  // Schedule re-render when each editable note expires
  notes.forEach(n => {
    const remaining = EDIT_WINDOW - (now - n.createdAt);
    if (remaining > 0 && remaining < EDIT_WINDOW) {
      const t = setTimeout(() => { if (modalId === projectId) renderNotes(projectId); }, remaining + 500);
      _noteTimers.push(t);
    }
  });
}

function postNote() {
  if (!modalId) return;
  const textarea = document.getElementById('modal-notes-textarea');
  const text = textarea.value.trim();
  if (!text) return;
  const notes = getNotes(modalId);
  const note = { id: 'n' + Date.now(), text, createdAt: Date.now(), editedAt: null };
  notes.push(note);
  saveNotes(modalId, notes);
  textarea.value = '';
  document.getElementById('notes-post-btn').disabled = true;
  renderNotes(modalId);
}

function startEditNote(noteId, projectId) {
  const notes = getNotes(projectId);
  const note = notes.find(n => n.id === noteId);
  if (!note) return;
  if (Date.now() - note.createdAt >= 5 * 60 * 1000) { renderNotes(projectId); return; }
  const bodyEl = document.getElementById(`note-body-${noteId}`);
  if (!bodyEl) return;
  bodyEl.innerHTML = `
    <textarea class="note-edit-textarea" id="note-edit-${noteId}">${escapeHtml(note.text)}</textarea>
    <div class="note-edit-actions">
      <button class="note-edit-save"   onclick="saveEditNote('${noteId}','${projectId}')">Guardar</button>
      <button class="note-edit-cancel" onclick="renderNotes('${projectId}')">Cancelar</button>
    </div>`;
  document.getElementById(`note-edit-${noteId}`)?.focus();
}

function saveEditNote(noteId, projectId) {
  const notes = getNotes(projectId);
  const note = notes.find(n => n.id === noteId);
  if (!note) return;
  if (Date.now() - note.createdAt >= 5 * 60 * 1000) { renderNotes(projectId); return; }
  const newText = document.getElementById(`note-edit-${noteId}`)?.value.trim();
  if (!newText) return;
  note.text = newText;
  note.editedAt = Date.now();
  saveNotes(projectId, notes);
  renderNotes(projectId);
}

// ── Attachments ─────────────────────────────────────────────
const ATTACH_NS = 'dinn-attach-';

function getAttachments(projectId) {
  try { return JSON.parse(localStorage.getItem(ATTACH_NS + projectId) || '[]'); } catch { return []; }
}
function saveAttachments(projectId, list) {
  localStorage.setItem(ATTACH_NS + projectId, JSON.stringify(list));
}

function renderAttachments(projectId) {
  const list = getAttachments(projectId);
  const container = document.getElementById('attach-list');
  if (!container) return;
  container.innerHTML = list.map((a, i) => {
    const isImg = a.type && a.type.startsWith('image/');
    const ext   = a.name.split('.').pop().toUpperCase().slice(0,4);
    const inner = isImg
      ? `<img src="${a.data}" alt="${escapeHtml(a.name)}">`
      : `<div class="attach-file-icon"><svg viewBox="0 0 24 24" width="24" height="24" fill="none"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="#0B645C" stroke-width="1.5"/><polyline points="14 2 14 8 20 8" stroke="#0B645C" stroke-width="1.5"/></svg><span class="attach-ext">${ext}</span></div>`;
    return `<div class="attach-item" title="${escapeHtml(a.name)}" onclick="openAttachment(${i},'${projectId}')">
      ${inner}
      <div class="attach-item-name">${escapeHtml(a.name)}</div>
      <button class="attach-del" onclick="event.stopPropagation();deleteAttachment(${i},'${projectId}')" title="Eliminar">✕</button>
    </div>`;
  }).join('');
}

function handleAttachFiles(e) {
  const attachSection = document.getElementById('modal-attach-section');
  const id = modalId || attachSection?.dataset.tempId;
  if (!id) return;
  const files = Array.from(e.target.files);
  e.target.value = '';
  const MAX_MB = 5;
  files.forEach(file => {
    if (file.size > MAX_MB * 1024 * 1024) {
      showToast(`"${file.name}" supera ${MAX_MB}MB`, 'error'); return;
    }
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const attachments = getAttachments(id);
        attachments.push({ name: file.name, type: file.type, data: ev.target.result });
        saveAttachments(id, attachments);
        renderAttachments(id);
      } catch (err) {
        showToast('No hay espacio suficiente en el navegador para guardar la imagen', 'error');
      }
    };
    reader.readAsDataURL(file);
  });
}

function openAttachment(index, projectId) {
  const list = getAttachments(projectId);
  const a = list[index];
  if (!a) return;
  if (a.type && a.type.startsWith('image/')) {
    const lb = document.getElementById('lightbox');
    document.getElementById('lightbox-img').src = a.data;
    document.getElementById('lightbox-name').textContent = a.name;
    lb.classList.add('open');
    document.addEventListener('keydown', _lbKeyHandler);
  } else {
    const link = document.createElement('a');
    link.href = a.data; link.download = a.name; link.click();
  }
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.removeEventListener('keydown', _lbKeyHandler);
}
function _lbKeyHandler(e) { if (e.key === 'Escape') closeLightbox(); }

function deleteAttachment(index, projectId) {
  const list = getAttachments(projectId);
  list.splice(index, 1);
  saveAttachments(projectId, list);
  renderAttachments(projectId);
}

function setupAttachDropZone(projectId) {
  const zone = document.getElementById('attach-drop-zone');
  if (!zone) return;
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    const files = Array.from(e.dataTransfer.files);
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => {
        const list = getAttachments(projectId);
        list.push({ name: file.name, type: file.type, data: ev.target.result });
        saveAttachments(projectId, list);
        renderAttachments(projectId);
      };
      reader.readAsDataURL(file);
    });
  });
}
