<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DINN Roadmap 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pine:     #0B645C;
      --elm:      #002421;
      --teal:     #27BCB0;
      --fresno:   #9AD9CF;
      --olive:    #E8F4F3;
      --yellow:   #FFE980;
      --gray-txt: #616161;
      --white:    #FFFFFF;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --shadow-card: 0 1px 3px rgba(0,0,0,.07), 0 4px 12px rgba(0,0,0,.06);
      --shadow-hover: 0 4px 16px rgba(11,100,92,.18);
      --t: 200ms cubic-bezier(.4,0,.2,1);
    }
    html, body { height:100%; overflow:hidden; }
    body { font-family:'Poppins',sans-serif; background:#F4F8F7; color:var(--elm); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
    body > #toast-container { position:fixed; }
    body > .modal-overlay   { position:fixed; }

    /* ── Toasts ─────────────────────────────────────────────── */
    #toast-container { position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px; }
    .toast { padding:12px 20px;border-radius:var(--radius-md);font-size:13px;font-weight:500;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,.18);animation:slideIn .25s ease forwards;max-width:320px; }
    .toast.success { background:#16A34A; }
    .toast.error   { background:#DC2626; }
    @keyframes slideIn  { from{transform:translateX(40px);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes slideOut { from{transform:translateX(0);opacity:1}    to{transform:translateX(40px);opacity:0} }
    @keyframes spin     { to{transform:rotate(360deg)} }

    /* ── Header ─────────────────────────────────────────────── */
    header { background:var(--white);border-bottom:1px solid #DDF0EE;position:sticky;top:0;z-index:100; }
    .header-inner { max-width:1200px;margin:0 auto;padding:0 24px; }
    .header-top { display:flex;align-items:center;gap:16px;padding:16px 0 12px;border-bottom:1px solid var(--olive); }
    .logo { display:flex;align-items:center;gap:10px; }
    .logo-mark { width:36px;height:36px;background:var(--pine);border-radius:var(--radius-sm);display:grid;place-items:center; }
    .logo-mark svg { width:20px;height:20px; }
    .logo-name { font-size:18px;font-weight:700;color:var(--elm);letter-spacing:-.3px; }
    .logo-tag  { font-size:11px;font-weight:500;color:var(--gray-txt);background:var(--olive);padding:2px 8px;border-radius:20px; }
    .header-right { margin-left:auto;display:flex;align-items:center;gap:8px; }

    .view-toggle { display:flex;gap:2px;background:var(--olive);border-radius:var(--radius-sm);padding:3px; }
    .view-btn { font-family:'Poppins',sans-serif;font-size:12px;font-weight:500;padding:5px 12px;border-radius:4px;border:none;cursor:pointer;color:var(--gray-txt);background:transparent;transition:all var(--t);display:flex;align-items:center;gap:5px; }
    .view-btn svg { width:13px;height:13px; }
    .view-btn.active { background:var(--white);color:var(--pine);box-shadow:0 1px 3px rgba(0,0,0,.1); }

    .sync-split { display:flex;border-radius:var(--radius-sm);overflow:hidden;border:1px solid #C5E3E0; }
    .sync-btn { display:flex;align-items:center;gap:6px;font-family:'Poppins',sans-serif;font-size:12px;font-weight:500;color:var(--pine);background:var(--olive);border:none;border-right:1px solid #C5E3E0;padding:7px 12px;cursor:pointer;transition:background var(--t); }
    .sync-btn:last-child { border-right:none; }
    .sync-btn:hover { background:#D0EAE8; }
    .sync-btn svg { width:14px;height:14px; }
    .sync-btn.spinning svg { animation:spin .8s linear infinite; }

    .metrics { display:grid;grid-template-columns:repeat(5,1fr);gap:8px;background:transparent;margin:14px 0; }
    .metric { background:var(--white);padding:14px 20px;display:flex;flex-direction:column;gap:2px;cursor:pointer;transition:all var(--t);border:1.5px solid #DDF0EE;border-radius:var(--radius-md); }
    .metric:hover { background:#F0FAF9;border-color:var(--teal); }
    .metric.active { background:#E8F4F3;border:2px solid var(--teal); }
    .metric-value { font-size:26px;font-weight:700;color:var(--elm);line-height:1; }
    .metric-label { font-size:11px;font-weight:500;color:var(--gray-txt);text-transform:uppercase;letter-spacing:.4px; }
    .metric-dot { width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px; }

    .filters { display:flex;gap:5px;flex-wrap:nowrap;padding:10px 0 6px;align-items:center;overflow-x:auto;-webkit-overflow-scrolling:touch; }
    .filters::-webkit-scrollbar { display:none; }
    .filters + .filters { padding-top:0;padding-bottom:14px; }
    .pill-status-dot { width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;flex-shrink:0; }
    .filter-label { font-size:10px;font-weight:600;color:var(--gray-txt);text-transform:uppercase;letter-spacing:.5px;margin-right:2px;flex-shrink:0; }
    .pill { font-family:'Poppins',sans-serif;font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;border:1.5px solid #DDF0EE;cursor:pointer;transition:all var(--t);background:var(--white);color:var(--elm);white-space:nowrap;flex-shrink:0; }
    .pill:hover { border-color:var(--teal);color:var(--pine); }
    .pill.active { background:var(--pine);color:var(--white);border-color:var(--pine); }

    /* ── Main ─────────────────────────────────────────────── */
    main { padding:28px 24px 0;flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0; }
    main.tl-view { padding:0;display:flex;flex-direction:column;flex:1;min-height:0; }
    .state-box { display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:80px 0;color:var(--gray-txt);font-size:14px; }
    .spinner { width:32px;height:32px;border:3px solid var(--olive);border-top-color:var(--pine);border-radius:50%;animation:spin .7s linear infinite; }

    /* ── Shared ───────────────────────────────────────────── */
    .badge { font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;letter-spacing:.2px;line-height:1.4; }
    .badge-prioridad-alta  { background:#FEE2E2;color:#991B1B; }
    .badge-prioridad-media { background:#FEF3C7;color:#92400E; }
    .badge-prioridad-baja  { background:#F1F5F9;color:#475569; }
    .badge-hoy { font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--yellow);color:#7A5900;letter-spacing:.3px; }

    /* ─────────────────────────────────────────────────────── */
    /* ── KANBAN ───────────────────────────────────────────── */
    /* ─────────────────────────────────────────────────────── */
    .kanban-board { display:flex;gap:12px;overflow-x:auto;align-items:stretch;-webkit-overflow-scrolling:touch;flex:1;min-height:0;padding-bottom:24px; }
    .kanban-board::-webkit-scrollbar { height:6px; }
    .kanban-board::-webkit-scrollbar-track { background:transparent; }
    .kanban-board::-webkit-scrollbar-thumb { background:var(--fresno);border-radius:3px; }

    .kanban-col { flex:0 0 224px;display:flex;flex-direction:column;gap:0;min-height:0; }
    .status-board { gap:16px; }
    .status-board .kanban-col { flex:1;min-width:300px;max-width:480px; }

    .kanban-head { padding:10px 12px 9px;background:var(--white);border-radius:var(--radius-md) var(--radius-md) 0 0;border:1.5px solid #DDF0EE;border-bottom:none;display:flex;align-items:center;justify-content:space-between;gap:6px;user-select:none;flex-shrink:0; }
    .kanban-head.is-current  { border-color:var(--teal);border-top-width:3px;background:#F0FAF9; }
    .kanban-col.archived-col .kanban-head { border-color:#E7E5E4;background:#FAFAF9; }
    .kanban-col.archived-col .kanban-body { border-color:#E7E5E4;background:#FAFAF9; }
    .kanban-col.archived-col .k-card { opacity:.65;border-color:#E7E5E4; }
    .kanban-col.archived-col .k-card:hover { opacity:.85; }
    .kanban-head.is-current .kanban-month { color:var(--pine); }
    .kanban-head.is-current .kanban-cnt   { background:var(--yellow);color:#7A5900; }
    .kanban-head.is-h2bucket { border-color:#BFDBFE;border-top:3px solid #3B82F6;background:#EFF6FF; }
    .kanban-head.is-h2bucket .kanban-month { color:#1D4ED8; }
    .kanban-head.is-h2bucket .kanban-cnt   { background:#DBEAFE;color:#1E40AF; }
    .kanban-month { font-size:12px;font-weight:600;color:var(--elm); }
    .kanban-cnt { font-size:10px;font-weight:600;color:var(--gray-txt);background:var(--olive);padding:2px 7px;border-radius:10px;white-space:nowrap; }

    .kanban-scroll-area { flex:1;min-height:0;overflow-y:auto;border:1.5px solid #DDF0EE;border-top:none;border-radius:0 0 var(--radius-md) var(--radius-md);padding:8px 8px 12px; }
    .kanban-scroll-area::-webkit-scrollbar { width:4px; }
    .kanban-scroll-area::-webkit-scrollbar-track { background:transparent; }
    .kanban-scroll-area::-webkit-scrollbar-thumb { background:transparent;border-radius:2px;transition:background .2s; }
    .kanban-scroll-area:hover::-webkit-scrollbar-thumb { background:var(--fresno); }
    .kanban-body { min-height:40px;display:flex;flex-direction:column;gap:8px;padding:0;border-radius:var(--radius-md);transition:background var(--t); }
    .kanban-body.drag-over { background:var(--olive);outline:2px dashed var(--teal);outline-offset:3px; }

    /* ── H2 divider ─────────────────────────────────────────── */
    .kanban-divider { flex:0 0 28px;display:flex;align-self:stretch;align-items:stretch;pointer-events:none;user-select:none; }
    .kd-inner { display:flex;flex-direction:column;align-items:center;width:100%;padding:12px 0; }
    .kd-inner::before,.kd-inner::after { content:'';flex:1;width:2px;border-radius:2px;background:linear-gradient(to bottom,transparent,var(--teal) 30%,var(--teal) 70%,transparent); }
    .kd-label { font-size:10px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:1.5px;writing-mode:vertical-lr;text-orientation:mixed;padding:10px 0; }

    /* ── Kanban card ─────────────────────────────────────────── */
    .k-card { background:var(--white);border-radius:var(--radius-md);box-shadow:var(--shadow-card);border:1.5px solid transparent;cursor:pointer;transition:box-shadow var(--t),transform var(--t),opacity var(--t),border-color var(--t);flex-shrink:0; }
    .k-card:hover { box-shadow:var(--shadow-hover);transform:translateY(-1px);border-color:var(--fresno); }
    .k-card.is-dragging { opacity:.35;cursor:grabbing;transform:scale(.97) rotate(.8deg);box-shadow:none; }
    .k-card.is-moving   { opacity:.6;cursor:wait; }

    .k-card-body { padding:13px 13px 10px; }
    .k-title-row { display:flex;align-items:flex-start;gap:6px;margin-bottom:8px; }
    .k-card-title { font-size:13px;font-weight:600;color:var(--elm);line-height:1.45;flex:1; }
    .k-card-meta { display:flex;flex-wrap:wrap;gap:4px; }

    .k-card-footer { display:flex;align-items:center;gap:6px;padding:6px 11px;border-top:1px solid var(--olive);background:#FAFEFE; }
    .k-status-dot  { width:7px;height:7px;border-radius:50%;flex-shrink:0; }
    .k-status-text { font-size:10px;font-weight:500;color:var(--gray-txt);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }

    /* ── Add card ────────────────────────────────────────────── */
    .add-card-btn { font-family:'Poppins',sans-serif;font-size:11px;font-weight:500;color:#AAC5C2;background:none;border:1.5px dashed #DDF0EE;border-radius:var(--radius-md);padding:8px 12px;cursor:pointer;width:100%;text-align:left;transition:all var(--t);display:flex;align-items:center;gap:6px; }
    .add-card-btn:hover { border-color:var(--teal);color:var(--pine);background:var(--olive); }
    .add-card-btn svg { width:12px;height:12px;flex-shrink:0; }
    .add-card-btn-top { margin-bottom:8px; }
    .k-vote-btn { display:flex;align-items:center;gap:3px;background:none;border:1.5px solid #E2E8F0;border-radius:20px;font-family:'Poppins',sans-serif;font-size:10px;font-weight:600;color:#94A3B8;padding:3px 8px;cursor:pointer;transition:all var(--t);flex-shrink:0; }
    .k-vote-btn:hover { border-color:var(--teal);color:var(--pine);background:var(--olive); }
    .k-vote-btn.has-votes { border-color:#F59E0B;color:#92400E;background:#FEF3C7; }
    .k-vote-btn svg { width:11px;height:11px; }
    .k-vote-btn:disabled { opacity:.35;cursor:not-allowed;border-color:#E2E8F0;color:#94A3B8;background:none; }
    .k-vote-btn:disabled:hover { border-color:#E2E8F0;color:#94A3B8;background:none;transform:none; }
    .k-card.drop-above { box-shadow:0 -3px 0 var(--teal),var(--shadow-card) !important; }
    .k-card.drop-below { box-shadow:0 3px 0 var(--teal),var(--shadow-card) !important; }
    .k-mes-select { font-family:'Poppins',sans-serif;font-size:9px;font-weight:500;padding:2px 6px;border-radius:10px;background:var(--olive);color:var(--gray-txt);border:1px solid transparent;cursor:pointer;outline:none;max-width:80px; }
    .k-mes-select:hover { border-color:var(--teal);background:#D0EAE8; }
    .k-mes-select:focus { border-color:var(--pine);background:#D0EAE8; }
    .k-similar-panel { border:1.5px solid #F59E0B;border-radius:var(--radius-md);background:#FFFBF0;padding:10px 12px;margin-top:8px;display:flex;flex-direction:column;gap:6px; }
    .k-similar-title { font-size:10px;font-weight:700;color:#92400E;text-transform:uppercase;letter-spacing:.4px; }
    .k-similar-item { display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 8px;background:var(--white);border-radius:6px;border:1px solid #FDE68A; }
    .k-similar-name { font-size:11px;font-weight:500;color:var(--elm);flex:1; }
    .k-similar-arrow-btn { display:flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:6px;background:var(--olive);border:none;cursor:pointer;color:var(--pine);flex-shrink:0;transition:background var(--t); }
    .k-similar-arrow-btn:hover { background:#DDF0EE; }
    .k-similar-arrow-btn svg { width:13px;height:13px; }
    .similar-preview { display:none;flex:1;flex-direction:column;overflow:hidden; }
    .similar-preview.open { display:flex; }
    .modal-card.create-mode.preview-open { width:880px; }
    .modal-card.create-mode.preview-open .modal-right { display:flex; }
    .add-card-form { background:var(--white);border-radius:var(--radius-md);border:1.5px solid var(--teal);padding:10px;display:flex;flex-direction:column;gap:8px;box-shadow:0 2px 12px rgba(0,0,0,.1); }
    .add-card-input { font-family:'Poppins',sans-serif;font-size:12px;font-weight:500;color:var(--elm);border:1.5px solid #DDF0EE;border-radius:var(--radius-sm);padding:8px 10px;outline:none;width:100%; }
    .add-card-input:focus { border-color:var(--pine); }
    .add-card-actions { display:flex;gap:6px; }
    .add-card-confirm { font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;color:var(--white);background:var(--pine);border:none;border-radius:var(--radius-sm);padding:6px 14px;cursor:pointer;flex:1;transition:background var(--t); }
    .add-card-confirm:hover { background:#0A5550; }
    .add-card-confirm:disabled { opacity:.6;cursor:wait; }
    .add-card-cancel { font-family:'Poppins',sans-serif;font-size:11px;color:var(--gray-txt);background:var(--olive);border:none;border-radius:var(--radius-sm);padding:6px 10px;cursor:pointer; }

    /* ─────────────────────────────────────────────────────── */
    /* ── TIMELINE (per-month columns) ────────────────────── */
    /* ─────────────────────────────────────────────────────── */
    .tl-wrapper { background:var(--white);overflow-x:auto;border-top:1px solid #DDF0EE;flex:1;min-height:0; }
    .tl-container { min-width:1000px;height:100%;display:flex;flex-direction:column; }

    /* Header rows */
    .tl-row { display:flex;border-bottom:1px solid #EEF6F5;min-height:46px; }
    .tl-row.tl-sem-row  { min-height:28px;background:#FAFEFE;flex-shrink:0; }
    .tl-row.tl-head-row { border-bottom:2px solid #DDF0EE;min-height:38px;flex-shrink:0; }
    .tl-row.tl-data-row { flex:1;min-height:46px; }
    .tl-row:last-child  { border-bottom:none; }
    .tl-row:nth-child(odd) .tl-data-cell  { background:var(--white); }
    .tl-row:nth-child(even) .tl-data-cell { background:#FAFEFE; }

    /* Semester group headers */
    .tl-sem-cell { flex:1;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gray-txt);border-right:1px solid #DDF0EE;padding:4px 6px; }
    .tl-sem-cell.h1-group { flex:6;background:#F5FCFB;border-top:2px solid var(--teal);color:var(--pine); }
    .tl-sem-cell.h2b-group { flex:1;background:#EFF6FF;border-top:2px solid #3B82F6;color:#1D4ED8; }
    .tl-sem-cell.h2-group  { flex:6;background:#F5FFFE;border-top:2px solid var(--fresno);color:#0A6B62; }
    .tl-sem-cell.bl-group  { flex:1;background:#FAFAFA;border-top:2px solid #CBD5E1;color:#64748B;border-right:none; }

    /* Month header cells */
    .tl-m-head { flex:1;min-width:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 4px;border-right:1px solid #EEF6F5;font-size:9px;font-weight:700;color:#B0BEC5;text-transform:uppercase;letter-spacing:.4px;background:#FAFEFE;cursor:pointer;transition:background var(--t),color var(--t),min-width .22s ease; }
    .tl-m-head:last-child { border-right:none; }
    .tl-m-head:hover { background:#F0FAF9;color:var(--pine); }
    .tl-m-head.h2b { background:#EFF6FF;color:#3B82F6; }
    .tl-m-head.is-today { background:#FFF8F8;color:#DC2626;border-top:3px solid #DC2626; }
    .tl-m-head.is-today .tl-today-tag { font-size:8px;font-weight:700;color:#DC2626;background:#FEE2E2;padding:1px 4px;border-radius:3px; }
    .tl-m-head.tl-col-active { min-width:200px;background:var(--olive) !important;color:var(--pine) !important;border-bottom:2px solid var(--teal);font-size:10px; }

    /* Data cells */
    .tl-data-cell { flex:1;min-width:56px;padding:5px 4px;border-right:1px solid #EEF6F5;display:flex;flex-direction:column;gap:4px;justify-content:center;position:relative;transition:min-width .22s ease,background .15s ease; }
    .tl-data-cell:last-child { border-right:none; }
    .tl-data-cell.h2b  { background:rgba(59,130,246,.03) !important; }
    .tl-data-cell.is-today { background:rgba(220,38,38,.025) !important; }
    .tl-data-cell.tl-col-active { min-width:200px;background:rgba(232,244,243,.45) !important; }

    /* Expanded bars */
    .tl-data-cell.tl-col-active .tl-bar { flex-direction:column;align-items:flex-start;gap:5px;padding:8px 10px;border-radius:var(--radius-md);box-shadow:0 2px 8px rgba(0,0,0,.18); }
    .tl-data-cell.tl-col-active .tl-bar-dot { display:none; }
    .tl-data-cell.tl-col-active .tl-bar-name { white-space:normal;font-size:11px;font-weight:600;line-height:1.35; }
    .tl-bar-extra { display:none;font-size:9px;font-weight:500;color:rgba(255,255,255,.8);line-height:1.3; }
    .tl-data-cell.tl-col-active .tl-bar-extra { display:block; }
    .tl-add-cell-btn { position:absolute;bottom:4px;right:4px;width:18px;height:18px;border-radius:50%;background:var(--teal);border:none;cursor:pointer;color:#fff;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity var(--t),transform var(--t);z-index:2;padding:0; }
    .tl-data-cell:hover .tl-add-cell-btn { opacity:1; }
    .tl-add-cell-btn:hover { transform:scale(1.15);background:var(--pine); }

    /* Timeline bars */
    .tl-bar { display:flex;align-items:center;gap:5px;padding:5px 7px;border-radius:var(--radius-sm);cursor:grab;overflow:hidden;transition:opacity var(--t),transform var(--t),box-shadow var(--t);position:relative; }
    .tl-bar:hover { opacity:.9;transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.18); }
    .tl-bar.tl-dragging { opacity:.3;cursor:grabbing;transform:scale(.95); }
    .tl-bar-dot  { width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.6);flex-shrink:0; }
    .tl-bar-name { font-size:10px;font-weight:500;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1; }

    /* Timeline DnD drop target */
    .tl-data-cell.tl-drop-over { outline:2px dashed var(--teal);outline-offset:-2px;background:rgba(39,188,176,.08) !important; }
    /* Gantt section */
    .tl-gantt-section { border-bottom:2px solid #DDF0EE;background:var(--white); }
    .tl-gantt-title { display:flex;align-items:center;gap:8px;padding:8px 12px;background:#F0FAF9;border-bottom:1px solid #DDF0EE;font-size:10px;font-weight:700;color:var(--pine);text-transform:uppercase;letter-spacing:.6px; }
    .tl-gantt-row { display:grid;grid-template-columns:140px repeat(12,1fr);min-height:34px;border-bottom:1px solid #EEF6F5;align-items:center; }
    .tl-gantt-row:last-child { border-bottom:none; }
    .tl-gantt-label { padding:4px 12px;font-size:10px;font-weight:600;color:var(--elm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-right:1px solid #DDF0EE;position:sticky;left:0;background:inherit;z-index:5;height:100%;display:flex;align-items:center; }
    .tl-gantt-bar { height:22px;border-radius:11px;display:flex;align-items:center;padding:0 10px;gap:6px;font-size:9px;font-weight:600;color:rgba(255,255,255,.95);cursor:pointer;overflow:hidden;white-space:nowrap;transition:opacity var(--t),transform var(--t),box-shadow var(--t);margin:4px 3px;align-self:center; }
    .tl-gantt-bar:hover { opacity:.88;transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.18); }
    .tl-gantt-bar-dates { font-size:8px;font-weight:500;color:rgba(255,255,255,.75);flex-shrink:0; }
    .tl-gantt-month-head { display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#B0BEC5;text-transform:uppercase;letter-spacing:.4px;border-right:1px solid #EEF6F5;padding:6px 2px; }
    .tl-gantt-month-head.is-today { background:#FFF8F8;color:#DC2626; }
    .tl-gantt-cell { border-right:1px solid #EEF6F5;min-height:34px;position:relative; }
    .tl-gantt-cell.is-today { background:rgba(220,38,38,.025); }

    /* Tooltip */
    #tl-tooltip { position:fixed;z-index:500;background:var(--elm);color:#fff;font-family:'Poppins',sans-serif;font-size:11px;font-weight:500;padding:5px 10px;border-radius:6px;pointer-events:none;white-space:nowrap;max-width:280px;white-space:normal;line-height:1.4;box-shadow:0 4px 14px rgba(0,0,0,.22);opacity:0;transition:opacity .12s ease;transform:translateY(4px);transition:opacity .12s ease,transform .12s ease; }
    #tl-tooltip.visible { opacity:1;transform:translateY(0); }

    /* ─────────────────────────────────────────────────────── */
    /* ── MODAL ────────────────────────────────────────────── */
    /* ─────────────────────────────────────────────────────── */
    .modal-overlay { position:fixed;inset:0;background:rgba(0,36,33,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s ease; }
    .modal-overlay.open { opacity:1;pointer-events:all; }
    .modal-card { background:var(--white);border-radius:var(--radius-lg);width:880px;max-width:calc(100vw - 32px);max-height:85vh;overflow:hidden;padding:0;transform:translateY(14px) scale(.98);transition:transform .22s cubic-bezier(.4,0,.2,1);box-shadow:0 24px 64px rgba(0,0,0,.22);display:flex;flex-direction:row; }
    .modal-overlay.open .modal-card { transform:translateY(0) scale(1); }
    .modal-card.create-mode { width:520px; }
    .modal-left { flex:0 0 580px;padding:28px;overflow-y:auto;max-height:85vh; }
    .modal-card.create-mode .modal-left { flex:1; }
    .modal-right { flex:1;display:flex;flex-direction:column;border-left:1px solid var(--olive);max-height:85vh;min-width:220px;max-width:280px;background:#FAFFFE; }
    .modal-card.create-mode .modal-right { display:none; }
    /* ── Notes panel ─────────────────────────────────────────── */
    .notes-panel-header { display:flex;align-items:center;gap:8px;padding:16px 18px 12px;border-bottom:1px solid var(--olive);flex-shrink:0; }
    .notes-panel-title { font-size:11px;font-weight:700;color:#B0BEC5;text-transform:uppercase;letter-spacing:.6px;flex:1; }
    .notes-panel-count { font-size:10px;font-weight:600;color:var(--gray-txt);background:var(--olive);padding:1px 7px;border-radius:10px; }
    .notes-list { flex:1;overflow-y:auto;padding:16px 14px 8px 14px;display:flex;flex-direction:column;gap:0; }
    .notes-list::-webkit-scrollbar { width:4px; }
    .notes-list::-webkit-scrollbar-track { background:transparent; }
    .notes-list::-webkit-scrollbar-thumb { background:transparent; }
    .notes-list:hover::-webkit-scrollbar-thumb { background:var(--fresno); }
    .notes-empty { font-size:12px;color:#CBD5E1;font-style:italic;text-align:center;padding:32px 0; }
    /* Timeline entries */
    .note-item { display:flex;gap:12px;position:relative;padding-bottom:20px; }
    .note-item:not(:last-child)::before { content:'';position:absolute;left:5px;top:16px;bottom:0;width:1.5px;background:#DDF0EE;z-index:0; }
    .note-dot { width:12px;height:12px;border-radius:50%;background:var(--pine);border:2px solid #fff;box-shadow:0 0 0 1.5px var(--pine);flex-shrink:0;margin-top:3px;position:relative;z-index:1; }
    .note-item:last-child .note-dot { background:var(--teal);box-shadow:0 0 0 1.5px var(--teal); }
    .note-content { flex:1;min-width:0; }
    .note-meta { display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:5px; }
    .note-date { font-size:10px;font-weight:600;color:#94A3B8; }
    .note-edited { font-style:italic;color:#CBD5E1;font-weight:400; }
    .note-edit-btn { font-family:'Poppins',sans-serif;font-size:10px;font-weight:500;color:var(--pine);background:none;border:none;cursor:pointer;padding:1px 6px;border-radius:3px;transition:background var(--t);flex-shrink:0; }
    .note-edit-btn:hover { background:var(--olive); }
    .note-body { font-size:12px;color:#374151;line-height:1.7;word-break:break-word;background:#FAFFFE;border:1px solid #E8F4F3;border-radius:8px;padding:9px 11px; }
    .note-edit-textarea { font-family:'Poppins',sans-serif;font-size:12px;color:var(--elm);line-height:1.6;width:100%;min-height:60px;border:1.5px solid var(--pine);border-radius:var(--radius-sm);padding:6px 8px;outline:none;resize:vertical;background:#F0FAF9; }
    .note-edit-actions { display:flex;gap:6px;margin-top:6px; }
    .note-edit-save { font-family:'Poppins',sans-serif;font-size:10px;font-weight:600;color:var(--white);background:var(--pine);border:none;border-radius:var(--radius-sm);padding:4px 12px;cursor:pointer; }
    .note-edit-cancel { font-family:'Poppins',sans-serif;font-size:10px;color:var(--gray-txt);background:var(--olive);border:none;border-radius:var(--radius-sm);padding:4px 10px;cursor:pointer; }
    .notes-input-area { padding:10px 14px;border-top:1px solid var(--olive);flex-shrink:0; }
    .notes-input-wrap { position:relative; }
    .notes-textarea { font-family:'Poppins',sans-serif;font-size:12px;color:var(--elm);line-height:1.6;width:100%;min-height:72px;border:1.5px solid #DDF0EE;border-radius:var(--radius-md);padding:8px 10px 36px 10px;outline:none;resize:none;background:var(--white);transition:border-color var(--t); }
    .notes-textarea:focus { border-color:var(--pine); }
    .notes-post-btn { position:absolute;bottom:8px;right:8px;display:flex;align-items:center;gap:5px;font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;color:var(--white);background:var(--pine);border:none;border-radius:var(--radius-sm);padding:5px 10px;cursor:pointer;transition:background var(--t),opacity var(--t); }
    .notes-post-btn:hover:not(:disabled) { background:#0A5550; }
    .notes-post-btn:disabled { opacity:.35;cursor:default; }
    .notes-post-btn svg { width:12px;height:12px;flex-shrink:0; }
    .modal-top  { display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px; }
    .modal-meta { display:flex;flex-wrap:wrap;gap:5px; }
    .modal-close { font-family:'Poppins',sans-serif;font-size:18px;line-height:1;color:var(--gray-txt);background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:4px;flex-shrink:0; }
    .modal-close:hover { background:var(--olive);color:var(--elm); }
    .modal-title-row { display:flex;align-items:flex-start;gap:8px;margin:14px 0 20px; }
    .modal-title { font-size:22px;font-weight:700;color:var(--elm);line-height:1.3;flex:1;margin:0; }
    .modal-title-edit-btn { flex-shrink:0;background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:4px;color:var(--gray-txt);display:flex;align-items:center;margin-top:4px;transition:all var(--t); }
    .modal-title-edit-btn:hover { background:var(--olive);color:var(--pine); }
    .modal-title-edit-btn svg { width:13px;height:13px; }
    .modal-title-input { font-family:'Poppins',sans-serif;font-size:22px;font-weight:700;color:var(--elm);border:none;border-bottom:2px solid var(--pine);background:transparent;outline:none;width:100%;padding:2px 0;line-height:1.3; }
    .modal-title-actions { display:flex;gap:6px;margin-top:6px; }
    .modal-title-save   { font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;color:var(--white);background:var(--pine);border:none;border-radius:var(--radius-sm);padding:5px 14px;cursor:pointer;transition:background var(--t); }
    .modal-title-save:hover { background:#0A5550; }
    .modal-title-save:disabled { opacity:.6;cursor:wait; }
    .modal-title-cancel { font-family:'Poppins',sans-serif;font-size:11px;color:var(--gray-txt);background:var(--olive);border:none;border-radius:var(--radius-sm);padding:5px 10px;cursor:pointer; }
    .modal-footer { display:flex;align-items:center;justify-content:flex-end;gap:8px;padding-top:16px;margin-top:16px;border-top:1px solid var(--olive); }
    .modal-create-btn { font-family:'Poppins',sans-serif;font-size:13px;font-weight:600;color:var(--white);background:var(--pine);border:none;border-radius:var(--radius-md);padding:10px 24px;cursor:pointer;transition:background var(--t); }
    .modal-create-btn:hover { background:#0A5550; }
    .modal-create-btn:disabled { opacity:.6;cursor:wait; }
    .modal-name-error { border-color:#DC2626 !important;background:#FFF5F5 !important; }
    .modal-delete-btn { font-family:'Poppins',sans-serif;font-size:12px;font-weight:500;color:#DC2626;background:none;border:1.5px solid #FECACA;border-radius:var(--radius-sm);padding:7px 16px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all var(--t); }
    .modal-delete-btn:hover { background:#FEF2F2;border-color:#DC2626; }
    .modal-delete-btn svg { width:13px;height:13px; }
    .modal-confirm-delete { display:flex;align-items:center;gap:8px;animation:slideIn .15s ease; }
    .modal-confirm-text { font-size:12px;color:#DC2626;font-weight:500; }
    .modal-confirm-yes { font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;color:var(--white);background:#DC2626;border:none;border-radius:var(--radius-sm);padding:7px 16px;cursor:pointer;transition:background var(--t); }
    .modal-confirm-yes:hover { background:#B91C1C; }
    .modal-confirm-yes:disabled { opacity:.6;cursor:wait; }
    .modal-confirm-no { font-family:'Poppins',sans-serif;font-size:12px;color:var(--gray-txt);background:var(--olive);border:none;border-radius:var(--radius-sm);padding:7px 12px;cursor:pointer; }
    .modal-status-bar { display:flex;align-items:center;gap:6px;padding:0 0 20px;margin-bottom:0; }
    .modal-spinner { width:16px;height:16px;border:2px solid var(--fresno);border-top-color:var(--pine);border-radius:50%;animation:spin .6s linear infinite;display:none;flex-shrink:0;margin-left:4px; }
    /* ── Status group toggle — pills independientes ────────────── */
    .status-group-toggle { display:flex;flex-wrap:wrap;gap:6px;flex-shrink:0; }
    .sgt-btn { font-family:'Poppins',sans-serif;font-size:11px;font-weight:500;padding:5px 13px;border-radius:20px;border:1.5px solid #DDF0EE;background:transparent;color:var(--gray-txt);cursor:pointer;transition:all 150ms ease;white-space:nowrap; }
    .sgt-btn:hover:not(.active) { border-color:var(--teal);color:var(--pine);background:var(--olive); }
    .sgt-btn.active { background:var(--pine);border-color:var(--pine);color:#fff;font-weight:600; }
    /* ── Toggle buttons (area) ────────────────────────────────── */
    .pilar-toggle { display:flex;flex-wrap:wrap;gap:5px;padding:4px 0 2px; }
    .ptoggle-btn { font-family:'Poppins',sans-serif;font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;border:1.5px solid #DDF0EE;background:transparent;color:var(--gray-txt);cursor:pointer;transition:all 150ms ease;white-space:nowrap; }
    .ptoggle-btn:hover { border-color:var(--teal);color:var(--pine); }
    .ptoggle-btn.active { border-color:transparent;color:#fff;font-weight:600; }
    /* ── Área section ──────────────────────────────────────────── */
    .modal-area-section { padding:16px 0 14px;border-top:1px solid var(--olive); }
    .modal-section-label { font-size:10px;font-weight:700;color:#B0BEC5;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:8px; }

    .modal-desc-text { font-size:14px;color:#374151;line-height:1.75;cursor:pointer;padding:12px 14px;border-radius:var(--radius-md);border:1.5px solid transparent;margin-bottom:8px;transition:border-color 150ms ease,background 150ms ease; }
    .modal-desc-text:hover { border-color:#DDF0EE;background:#F9FFFE; }
    .modal-desc-text p { margin:0; }
    .modal-empty-desc { font-style:italic;color:#B0BEC5; }
    .modal-desc-textarea { font-family:'Poppins',sans-serif;font-size:13px;color:var(--elm);line-height:1.7;width:100%;min-height:120px;border:1.5px solid var(--pine);border-radius:var(--radius-md);padding:10px 12px;outline:none;resize:vertical;background:#F0FAF9;transition:border-color var(--t); }
    .modal-desc-textarea:focus { border-color:var(--teal); }
    .modal-desc-actions { display:flex;gap:8px;margin-top:8px; }
    .modal-desc-save { font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;color:var(--white);background:var(--pine);border:none;border-radius:var(--radius-sm);padding:7px 18px;cursor:pointer;transition:background var(--t); }
    .modal-desc-save:hover { background:#0A5550; }
    .modal-desc-save:disabled { opacity:.6;cursor:wait; }
    .modal-desc-cancel { font-family:'Poppins',sans-serif;font-size:12px;color:var(--gray-txt);background:var(--olive);border:none;border-radius:var(--radius-sm);padding:7px 12px;cursor:pointer; }

    /* ── Attachments ───────────────────────────────────────────── */
    input[type="date"].add-card-input { color-scheme:light; }
    .modal-attach-section { margin-top:20px;border-top:1px solid var(--olive);padding-top:14px; }
    .modal-attach-label { font-size:10px;font-weight:700;color:#B0BEC5;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px; }
    .attach-drop-zone { border:1.5px dashed #DDF0EE;border-radius:var(--radius-md);padding:14px 16px;text-align:center;cursor:pointer;transition:all var(--t);background:#FAFFFE; }
    .attach-drop-zone:hover,.attach-drop-zone.drag-over { border-color:var(--teal);background:#F0FAF9; }
    .attach-drop-zone input[type=file] { display:none; }
    .attach-drop-zone-label { font-size:12px;color:var(--gray-txt); }
    .attach-drop-zone-label span { color:var(--pine);font-weight:600;cursor:pointer; }
    .attach-list { display:flex;flex-wrap:wrap;gap:8px;margin-top:10px; }
    .attach-item { position:relative;border-radius:var(--radius-sm);overflow:hidden;border:1px solid #E8F4F3;background:#fff;cursor:pointer;transition:box-shadow var(--t); }
    .attach-item:hover { box-shadow:0 2px 8px rgba(0,0,0,.1); }
    .attach-item img { width:80px;height:80px;object-fit:cover;display:block; }
    .attach-file-icon { width:80px;height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:9px;color:var(--gray-txt);padding:8px; }
    .attach-file-icon .attach-ext { font-size:11px;font-weight:700;color:var(--pine); }
    .attach-item-name { font-size:9px;color:var(--gray-txt);padding:3px 5px;background:#F8FAFC;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px; }
    .attach-del { position:absolute;top:3px;right:3px;width:16px;height:16px;border-radius:50%;background:rgba(0,0,0,.45);border:none;cursor:pointer;display:none;align-items:center;justify-content:center;color:#fff;font-size:10px;line-height:1; }
    .attach-item:hover .attach-del { display:flex; }

    .k-status-badge { font-size:9px;font-weight:600;padding:2px 7px;border-radius:10px;display:inline-block; }
    .k-mes-badge    { font-size:9px;font-weight:500;padding:2px 7px;border-radius:10px;background:var(--olive);color:var(--gray-txt);display:inline-block; }
    .k-link-badge { display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:4px;background:#F1F5F9;color:#94A3B8;text-decoration:none;flex-shrink:0;transition:background var(--t),color var(--t); }
    .k-link-badge:hover { background:#DDF0EE;color:var(--pine); }
    .k-link-badge svg { width:11px;height:11px; }
    .search-wrap { display:flex;align-items:center;gap:6px;background:#F1F5F9;border:1px solid #E2E8F0;border-radius:20px;padding:5px 12px;min-width:200px;transition:border-color var(--t),box-shadow var(--t); }
    .search-wrap:focus-within { border-color:var(--teal);box-shadow:0 0 0 3px rgba(39,188,176,.12);background:#fff; }
    .search-icon { width:14px;height:14px;color:#94A3B8;flex-shrink:0; }
    .search-input { border:none;background:transparent;outline:none;font-family:'Poppins',sans-serif;font-size:12px;font-weight:400;color:var(--elm);width:100%;min-width:0; }
    .search-input::placeholder { color:#94A3B8; }
    .search-clear { background:none;border:none;cursor:pointer;color:#94A3B8;font-size:16px;line-height:1;padding:0;flex-shrink:0;display:flex;align-items:center; }
    .search-clear:hover { color:var(--pine); }
    .completado-month-divider { font-size:10px;font-weight:700;color:var(--gray-txt);text-transform:uppercase;letter-spacing:.6px;padding:10px 4px 4px;border-bottom:1.5px solid var(--olive);margin-bottom:6px;margin-top:4px; }

    @media (max-width:700px) {
      .metrics { grid-template-columns:repeat(2,1fr); }
      .header-top { flex-wrap:wrap; }
    }
    /* ── Lightbox ─────────────────────────────────────────────── */
    .lightbox { position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s ease;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px); }
    .lightbox.open { opacity:1;pointer-events:all; }
    .lightbox-img { max-width:92vw;max-height:92vh;border-radius:8px;box-shadow:0 32px 80px rgba(0,0,0,.5);object-fit:contain;transform:scale(.96);transition:transform .22s cubic-bezier(.4,0,.2,1); }
    .lightbox.open .lightbox-img { transform:scale(1); }
    .lightbox-close { position:fixed;top:20px;right:24px;background:rgba(255,255,255,.12);border:none;border-radius:50%;width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;transition:background .15s; }
    .lightbox-close:hover { background:rgba(255,255,255,.22); }
    .lightbox-name { position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.65);font-size:12px;font-family:'Poppins',sans-serif;white-space:nowrap;pointer-events:none; }

    /* ── Review Mode ────────────────────────────────────────── */
    .review-trigger-btn { display:flex;align-items:center;gap:6px;font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;color:#fff;background:var(--pine);border:none;border-radius:var(--radius-sm);padding:7px 14px;cursor:pointer;transition:background var(--t);white-space:nowrap; }
    .review-trigger-btn:hover { background:#0A5550; }
    .review-trigger-btn svg { width:13px;height:13px;flex-shrink:0; }
    .review-overlay { position:fixed;inset:0;z-index:9000;background:#001A18;display:none;flex-direction:column;align-items:center;justify-content:center;font-family:'Poppins',sans-serif; }
    .review-overlay.active { display:flex; }
    .review-topbar { position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:22px 28px; }
    .review-close-btn { display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.5);cursor:pointer;font-size:20px;line-height:1;transition:all 150ms ease; }
    .review-close-btn:hover { background:rgba(255,255,255,.1);color:#fff; }
    .review-progress-wrap { display:flex;align-items:center;gap:10px; }
    .review-progress-label { font-size:11px;font-weight:600;color:rgba(255,255,255,.35);letter-spacing:.4px; }
    .review-progress-bar { width:100px;height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden; }
    .review-progress-fill { height:100%;background:var(--teal);border-radius:2px;transition:width 280ms ease; }
    .review-card-wrap { width:100%;max-width:520px;padding:0 24px; }
    .review-card { background:#fff;border-radius:20px;padding:30px 30px 26px;box-shadow:0 40px 80px rgba(0,0,0,.45),0 8px 24px rgba(0,0,0,.25); }
    .review-card.anim-enter { animation:rv-enter 250ms ease forwards; }
    .review-card.anim-exit-left { animation:rv-exit-left 180ms ease forwards; }
    .review-card.anim-exit-right { animation:rv-exit-right 180ms ease forwards; }
    @keyframes rv-enter { from{opacity:0;transform:translateX(60px)} to{opacity:1;transform:translateX(0)} }
    @keyframes rv-exit-left { from{opacity:1;transform:translateX(0)} to{opacity:0;transform:translateX(-80px)} }

<script>
// ── GitHub ──────────────────────────────────────────────────
const GH_OWNER = 'luisoctavioge';
const GH_REPO  = 'dinn-proyectos-2026';
const GH_PATH  = 'dinn-roadmap/data.json';
const GH_API   = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}`;
const GH_RAW   = `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/main/${GH_PATH}`;
const LS_KEY   = 'dinn-roadmap-data';

// ── Airtable (configuración) ─────────────────────────────────
const AT_BASE  = 'apppW2dYQR1fq1a8i';
const AT_TABLE = 'tbl9dnfWuOX9AWjjE';
const AT_URL   = `https://api.airtable.com/v0/${AT_BASE}/${AT_TABLE}`;
const AT_FIELDS = { nombre:'fldPfQnkalgfOlEFd', estatus:'fldhBmfdglPCANjq3', desc:'fldMZtRGHHd8pvVYv', prioridad:'flds5LPdTaIwjm13W', semestre:'fldE0cnERdlC392Hf', mes:'fldrzAez1ULULrWAy' };

// ── Proxy seguro — todas las llamadas Airtable pasan por /api/airtable ──
async function atFetch(url, { method = 'GET', body } = {}) {
  const res = await fetch('/api/airtable', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ method, url, body }),
  });
  return res;
}

// ── Tabla Dashboard (fuente de verdad compartida) ─────────────
const AT_DASH_TABLE  = 'tblhkJEqRZW00Jbbc';
const AT_DASH_URL    = `https://api.airtable.com/v0/${AT_BASE}/${AT_DASH_TABLE}`;
const AT_DASH_FIELDS = {
  nombre:    'fldH0kqMo7SLpPdsK',
  estatus:   'fldvAQSaJuzoqfNWK',
  area:      'fldEKeweipBAIAsTE',  // singleSelect — 1 área por proyecto
  categoria: 'fld3gOX9u7ndPdgeC',  // multipleSelects — varias categorías
  bitacora:  'fld31iyeYP5IxBmrd',
  desc:      'fld8uzIn8Gk5rQHkH',
  semestre:  'fldZalbBLBHrmrRQo',
  mes:       'fldXFvWNgP0n8DyRJ',
  link:      'fld9KYXW9OfzmXRux',
  votos:       'fldkIOo73R2ozmCJ7',
  idApp:       'fldhFiXHVKp4ZTsT3',
  fechaInicio: 'fldBYiiVPOZFEnglT',
  fechaFin:    'fld4o6GnBR52YYJQA',
};

// ── Helper: PATCH un registro en la tabla Dashboard ───────────
async function patchAirtable(atId, fields) {
  if (!atId) return;
  try {
    await atFetch(`${AT_DASH_URL}/${atId}`, { method: 'PATCH', body: { fields } });
  } catch(e) { console.warn('[AT PATCH]', e); }
}

// ── Helper: Crear registro en Dashboard → devuelve atId ───────
async function createInAirtable(proj) {
  try {
    const fields = {
      [AT_DASH_FIELDS.nombre]:   proj.nombre,
      [AT_DASH_FIELDS.estatus]:  getStatusGroup(proj.estatus),
      [AT_DASH_FIELDS.semestre]: proj.semestre || 'Backlog',
      [AT_DASH_FIELDS.mes]:      proj.mes || 'Backlog',
      [AT_DASH_FIELDS.idApp]:    proj.id,
    };
    if (proj.area) fields[AT_DASH_FIELDS.area] = proj.area;
    if (proj.categoria?.length) fields[AT_DASH_FIELDS.categoria] = proj.categoria;
    if (proj.fechaInicio) fields[AT_DASH_FIELDS.fechaInicio] = proj.fechaInicio;
    if (proj.fechaFin)    fields[AT_DASH_FIELDS.fechaFin]    = proj.fechaFin;
    const res = await atFetch(AT_DASH_URL, { method: 'POST', body: { fields } });
    const data = await res.json();
    if (!data.id) { console.warn('[AT CREATE] error:', data); return null; }
    return data.id;
  } catch(e) { console.warn('[AT CREATE]', e); return null; }
}

// ── Helper: Eliminar registro en Dashboard ────────────────────
async function deleteFromAirtable(atId) {
  if (!atId) return;
  try {
    await atFetch(`${AT_DASH_URL}/${atId}`, { method: 'DELETE' });
  } catch(e) { console.warn('[AT DELETE]', e); }
}

async function importFromAirtable() {
  const params = new URLSearchParams();
  params.set('returnFieldsByFieldId', 'true');
  Object.values(AT_DASH_FIELDS).forEach(id => params.append('fields[]', id));
  let records = [], offset = null;
  do {
    const res = await atFetch(AT_DASH_URL + '?' + params + (offset ? '&offset=' + offset : ''));
    if (!res.ok) throw new Error(`Airtable ${res.status}`);
    const data = await res.json();
    records = records.concat(data.records || []);
    offset = data.offset || null;
  } while (offset);
  return records.map(r => {
    const f = r.fields;
    const idApp = f[AT_DASH_FIELDS.idApp] || r.id;
    // Sincronizar bitácora al localStorage
    const bitacora = f[AT_DASH_FIELDS.bitacora] || '';
    if (bitacora) {
      try { localStorage.setItem('dinn-notes-' + idApp, bitacora); } catch(e) {}
    }
    const rawArea = f[AT_DASH_FIELDS.area];
    const area = rawArea ? (typeof rawArea === 'object' ? rawArea.name : String(rawArea)) : '';
    const rawCat = f[AT_DASH_FIELDS.categoria];
    const categoria = Array.isArray(rawCat) ? rawCat.map(c => typeof c === 'object' ? c.name : c) : [];
    return {
      id:        idApp,
      _atId:     r.id,
      nombre:    f[AT_DASH_FIELDS.nombre]   || '(sin nombre)',
      estatus:   f[AT_DASH_FIELDS.estatus]  || 'En desarrollo',
      desc:      f[AT_DASH_FIELDS.desc]     || '',
      area,
      categoria,
      semestre:  f[AT_DASH_FIELDS.semestre] || 'Backlog',
      mes:       f[AT_DASH_FIELDS.mes]      || 'Backlog',
      link:        f[AT_DASH_FIELDS.link]     || '',
      votes:       typeof f[AT_DASH_FIELDS.votos] === 'number' ? f[AT_DASH_FIELDS.votos] : 0,
      prioridad:   '',
      fechaInicio: f[AT_DASH_FIELDS.fechaInicio] || '',
      fechaFin:    f[AT_DASH_FIELDS.fechaFin]    || '',
    };
  });
}

function genId() { return Date.now().toString(36)+Math.random().toString(36).substr(2,5); }

let _autoSaveTimer = null;
let _isLoading = false;

function scheduleAutoSave() {
  if (_isLoading) return;
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(async () => {
    const token = localStorage.getItem('dinn-gh-token');
    if (!token) return;
    const indicator = document.getElementById('autosave-indicator');
    if (indicator) { indicator.textContent = '↑ Guardando…'; indicator.style.opacity = '1'; }
    try {
      const getRes = await fetch(GH_API, { headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' } });
      const sha = getRes.ok ? (await getRes.json()).sha : undefined;
      const json  = JSON.stringify(allProjects, null, 2);
      const bytes = new TextEncoder().encode(json);
      const b64   = btoa(String.fromCharCode(...bytes));
      const body  = { message: `Auto-save — ${new Date().toLocaleString('es-MX')}`, content: b64 };
      if (sha) body.sha = sha;
      const putRes = await fetch(GH_API, {
        method: 'PUT',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github+json' },
        body: JSON.stringify(body)
      });
      if (!putRes.ok && putRes.status === 401) localStorage.removeItem('dinn-gh-token');
      if (indicator) { indicator.textContent = '✓ Guardado'; setTimeout(() => { indicator.style.opacity = '0'; }, 2000); }
    } catch(e) {
      if (indicator) { indicator.textContent = '⚠ Sin conexión'; setTimeout(() => { indicator.style.opacity = '0'; }, 3000); }
    }
  }, 2000);
}

function saveLocal() { localStorage.setItem(LS_KEY, JSON.stringify(allProjects)); scheduleAutoSave(); }

function showToast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => { el.style.animation='slideOut .25s ease forwards'; setTimeout(()=>el.remove(),260); }, 3500);
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

function prioridadClass(p) {
  if (!p) return '';
  const l = p.toLowerCase();
  if (l.includes('alta'))  return 'badge-prioridad-alta';
  if (l.includes('media')) return 'badge-prioridad-media';
  return 'badge-prioridad-baja';
}

function slugify(s) { return s.replace(/[^a-zA-Z0-9]/g,'-'); }

// Bucket de display: usa mes específico si existe, H2 sin mes si semestre=H2, Backlog si no
function getDisplayBucket(proj) {
  if (H1_MONTHS.has(proj.mes)) return proj.mes;
  if (H2_MONTHS.has(proj.mes)) return proj.mes;
  if (proj.semestre === 'H2 2026') return 'H2 sin mes';
  return 'Backlog';
}

function getSemestreFromBucket(bucket) {
  if (H1_MONTHS.has(bucket)) return 'H1 2026';
  if (H2_MONTHS.has(bucket) || bucket === 'H2 sin mes') return 'H2 2026';
  return 'Backlog';
}

// ── Carga de datos ───────────────────────────────────────────
async function loadProjects() {
  _isLoading = true;
  const btn = document.getElementById('sync-btn');
  if (btn) btn.classList.add('spinning');
  try {
    // 1. FUENTE DE VERDAD: Airtable Dashboard (compartido entre todos los usuarios)
    try {
      allProjects = await importFromAirtable();
      saveLocal(); // guardar en caché local
    } catch(atErr) {
      console.warn('[loadProjects] Airtable no disponible, usando caché local:', atErr);
      // 2. Fallback: localStorage (cuando no hay conexión)
      const stored = localStorage.getItem(LS_KEY);
      if (stored) {
        try { allProjects = JSON.parse(stored); }
        catch { allProjects = []; }
      }
      if (allProjects.length === 0) {
        showToast('Sin conexión — los datos pueden no estar actualizados', 'error');
      }
    }
  } catch(e) {
    allProjects = [];
  }
  // Normalizar datos: garantizar tipos correctos en todos los campos
  let dataNeedsResave = false;
  allProjects = allProjects.map(p => {
    // Normalize area: string (singleSelect)
    let area = p.area;
    if (Array.isArray(area)) { area = area.length ? area[0] : ''; dataNeedsResave = true; }
    else if (area && typeof area !== 'string') { area = String(area); dataNeedsResave = true; }
    area = area || '';
    // Normalize categoria: always array
    let categoria = p.categoria;
    if (!Array.isArray(categoria)) { categoria = categoria ? [categoria] : []; dataNeedsResave = true; }
    return {
      ...p,
      nombre:    (p.nombre && p.nombre !== 'undefined')   ? String(p.nombre)    : '(sin nombre)',
      estatus:   p.estatus   ? String(p.estatus)   : 'Nueva Captura',
      desc:      p.desc      ? String(p.desc)      : '',
      area,
      categoria,
      prioridad: p.prioridad ? String(p.prioridad) : '',
      semestre:  p.semestre  ? String(p.semestre)  : 'Backlog',
      mes:       p.mes       ? String(p.mes)       : 'Backlog',
      votes:     typeof p.votes === 'number' ? p.votes : 0,
    };
  });
  if (dataNeedsResave) saveLocal(); // persistir data limpia

  // Inyectar DATA_PATCHES que no existen aún; actualizar campos nuevos en existentes
  let patchesChanged = false;
  DATA_PATCHES.forEach(patch => {
    const existing = allProjects.find(p => p.id === patch.id);
    if (!existing) {
      allProjects.push(patch);
      patchesChanged = true;
    } else {
      // Propagar campos nuevos sin sobreescribir edits del usuario
      ['area', 'categoria'].forEach(field => {
        if (existing[field] === undefined && patch[field] !== undefined) {
          existing[field] = patch[field];
          patchesChanged = true;
        }
      });
    }
  });
  if (patchesChanged) saveLocal();

  updateMetrics(allProjects);
  renderProjects();
  if (btn) btn.classList.remove('spinning');
  _isLoading = false;
}

function renderKanban() {
  const main = document.getElementById('main-content');
  main.classList.remove('tl-view');
  const projects = filteredProjects();
  if (!projects.length) { main.innerHTML='<div class="state-box"><span>No hay proyectos con estos filtros.</span></div>'; return; }

  const byGroup = {};
  STATUS_GROUP_ORDER.forEach(g => byGroup[g] = []);
  for (const p of projects) byGroup[getStatusGroup(p.estatus)].push(p);
  byGroup['Backlog'].sort((a,b) => (b.votes||0) - (a.votes||0));

  let html = '<div class="kanban-board status-board" id="kanban-board">';
  for (const group of STATUS_GROUP_ORDER) {
    const cfg   = STATUS_GROUPS[group];
    const cards = byGroup[group];
    const defaultSt = cfg.statuses[0];
    html += `
      <div class="kanban-col${group === 'Archivado' ? ' archived-col' : ''}">
        <div class="kanban-head" style="border-top:3px solid ${cfg.color}">
          <span class="kanban-month" style="color:${cfg.text}">${group}</span>
          <span class="kanban-cnt" id="cnt-sg-${slugify(group)}" style="background:${cfg.bg};color:${cfg.text}">${cards.length}</span>
        </div>
        <div class="kanban-scroll-area">
          ${group === 'Backlog' ? `<button class="add-card-btn add-card-btn-top" onclick="openNewProjectModal(null,'','${defaultSt}')"><svg viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg> Agregar proyecto</button>` : ''}
          <div class="kanban-body" data-group="${group}" id="sgbody-${slugify(group)}">
            ${group === 'Completado' ? renderCompletadoCards(cards) : cards.map(p=>renderKCard(p)).join('')}
          </div>
        </div>
      </div>`;
  }
  html += '</div>';
  main.innerHTML = html;
  setupStatusDnD();
  cleanEmptyMonthDividers();
}

function renderCardsByMonth(cards, descending = true) {
  const monthOrder = descending ? [...MONTHS].reverse() : [...MONTHS];
  const byMonth = {};
  for (const p of cards) {
    const bucket = getDisplayBucket(p);
    if (!byMonth[bucket]) byMonth[bucket] = [];
    byMonth[bucket].push(p);
  }
  let html = '';
  for (const month of monthOrder) {
    if (!byMonth[month] || !byMonth[month].length) continue;
    const label = month === 'H2 sin mes' ? '2do Semestre' : month === 'Backlog' ? 'Sin mes' : month;
    html += `<div class="completado-month-divider" data-mes="${month}">${label}</div>`;
    html += byMonth[month].map(p => renderKCard(p)).join('');
  }
  return html;
}
function renderCompletadoCards(cards) { return renderCardsByMonth(cards, true); }

function renderKCard(p) {
  const gc = STATUS_GROUPS[getStatusGroup(p.estatus)] || STATUS_GROUPS['Backlog'];
  const areaInfo = p.area ? AREA_COLORS[p.area] : null;
  const areaBadge = p.area

    : '';
  const catBadges = (Array.isArray(p.categoria) ? p.categoria : []).map(c => {
    const ci = CATEGORIA_COLORS[c];
    return ci ? `<span class="badge" style="background:${ci.bg};color:${ci.text};font-size:9px;padding:2px 7px">${c}</span>` : '';

function cleanEmptyMonthDividers() {
  document.querySelectorAll('.completado-month-divider').forEach(divider => {

    let hasCard = false;
    while (next && !next.classList.contains('completado-month-divider')) {

let wasDragging = false;

function handleCardClick(e, id) {
  if (wasDragging) { wasDragging = false; return; }
  openModal(id);
}

function setupDnD() {
  document.querySelectorAll('.k-card').forEach(card => {
    card.addEventListener('dragstart', e => {
      dragSrc = card.dataset.id;
      wasDragging = true;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', dragSrc);
      requestAnimationFrame(() => card.classList.add('is-dragging'));
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('is-dragging');
      document.querySelectorAll('.kanban-body').forEach(b => b.classList.remove('drag-over'));
      dragSrc = null;
      setTimeout(() => { wasDragging = false; }, 50);
    });
  });
  document.querySelectorAll('.kanban-body').forEach(body => {
    body.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect='move'; body.classList.add('drag-over'); });
    body.addEventListener('dragleave', e => { if (!body.contains(e.relatedTarget)) body.classList.remove('drag-over'); });
    body.addEventListener('drop', e => {
      e.preventDefault();
      body.classList.remove('drag-over');
      const id = dragSrc || e.dataTransfer.getData('text/plain');
      if (!id) return;
      const newBucket = body.dataset.mes;
      const proj = allProjects.find(p => p.id===id);
      if (!proj || getDisplayBucket(proj)===newBucket) return;
      const prevBucket = getDisplayBucket(proj);
      const cardEl = document.getElementById(`kcard-${id}`);
      if (cardEl) body.appendChild(cardEl);
      if (newBucket==='H2 sin mes') { proj.mes='Backlog'; proj.semestre='H2 2026'; }
      else if (newBucket==='Backlog') { proj.mes='Backlog'; proj.semestre='Backlog'; }
      else { proj.mes=newBucket; }
      refreshKanbanCounts();
      patchMes(id, newBucket, prevBucket, proj);
    });
  });
}

    const cnt = document.getElementById(`cnt-sg-${slugify(body.dataset.group)}`);

function persistColumnOrder(body) {
  const orderedIds = [...body.querySelectorAll('.k-card')].map(c => c.dataset.id);
  if (!orderedIds.length) return;
  const idSet = new Set(orderedIds);
  const ordered = orderedIds.map(id => allProjects.find(p => p.id === id)).filter(Boolean);
  let i = 0;
  allProjects = allProjects.map(p => idSet.has(p.id) ? ordered[i++] : p);
  saveLocal();
}

// ── DnD por grupo de estatus ──────────────────────────────────
function setupStatusDnD() {
  document.querySelectorAll('.k-card').forEach(card => {
    card.addEventListener('dragstart', e => {
      dragSrc = card.dataset.id; wasDragging = true;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', dragSrc);
      requestAnimationFrame(() => card.classList.add('is-dragging'));
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('is-dragging');
      clearDropIndicators();
      document.querySelectorAll('.kanban-body').forEach(b => b.classList.remove('drag-over'));
      dragSrc = null;
      setTimeout(() => { wasDragging = false; }, 50);
    });
    // Within-column reorder (Completado is locked — no drag reorder)
    card.addEventListener('dragover', e => {
      const id = dragSrc;
      if (!id || id === card.dataset.id) return;
      const srcCard = document.getElementById(`kcard-${id}`);
      if (!srcCard) return;
      const body = card.closest('.kanban-body');
      if (!body || srcCard.closest('.kanban-body') !== body) return;
      if (body.dataset.group === 'Completado') return; // locked
      e.preventDefault();
      e.stopPropagation();
      clearDropIndicators();
      const mid = card.getBoundingClientRect().top + card.getBoundingClientRect().height / 2;
      card.classList.add(e.clientY < mid ? 'drop-above' : 'drop-below');
    });
    card.addEventListener('dragleave', e => {
      if (!card.contains(e.relatedTarget)) card.classList.remove('drop-above','drop-below');
    });
    card.addEventListener('drop', e => {
      const id = dragSrc || e.dataTransfer.getData('text/plain');
      if (!id || id === card.dataset.id) return;
      const srcCard = document.getElementById(`kcard-${id}`);
      if (!srcCard) return;
      const body = card.closest('.kanban-body');
      if (!body || srcCard.closest('.kanban-body') !== body) return;
      if (body.dataset.group === 'Completado' || body.dataset.group === 'Archivado') return; // locked
      e.preventDefault();
      e.stopPropagation();
      clearDropIndicators();
      body.classList.remove('drag-over');
      const mid = card.getBoundingClientRect().top + card.getBoundingClientRect().height / 2;
      if (e.clientY < mid) body.insertBefore(srcCard, card);
      else body.insertBefore(srcCard, card.nextSibling);
      persistColumnOrder(body);
      refreshKanbanCounts();
    });
  });
  document.querySelectorAll('.kanban-body[data-group]').forEach(body => {
    body.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect='move'; body.classList.add('drag-over'); });
    body.addEventListener('dragleave', e => { if (!body.contains(e.relatedTarget)) body.classList.remove('drag-over'); });
    body.addEventListener('drop', e => {
      e.preventDefault();
      body.classList.remove('drag-over');
      const id = dragSrc || e.dataTransfer.getData('text/plain');
      if (!id) return;
      const newGroup = body.dataset.group;
      const proj = allProjects.find(p => p.id === id);
      if (!proj) return;
      const prevGroup = getStatusGroup(proj.estatus);
      if (prevGroup === newGroup) return;  // mismo grupo, no hacer nada

      // Nuevo estatus = primer estatus del grupo destino
      const newEstatus = STATUS_GROUPS[newGroup].statuses[0];
      const prevEstatus = proj.estatus;

      // Actualizar local + badge
      proj.estatus = newEstatus;
      patchAirtable(proj._atId, { [AT_DASH_FIELDS.estatus]: getStatusGroup(newEstatus) });

      // Completado y Archivado re-render fully
      if (newGroup === 'Completado' || prevGroup === 'Completado' || newGroup === 'Archivado' || prevGroup === 'Archivado') {
        saveLocal();
        updateMetrics(allProjects);
        renderKanban();
        showToast(`✓ Movido a ${newGroup}`, 'success');
        return;
      }

      // Mover card en DOM
      const cardEl = document.getElementById(`kcard-${id}`);
      if (cardEl) body.appendChild(cardEl);
      refreshKanbanCounts();
      cleanEmptyMonthDividers();
      const gc = STATUS_GROUPS[newGroup];
      const badge = cardEl?.querySelector('.k-status-badge');
      if (badge) { badge.style.background=gc.bg; badge.style.color=gc.text; badge.textContent=newEstatus; }
      // Rocket: habilitar si vuelve a Backlog, deshabilitar si sale
      const rocketBtn = cardEl?.querySelector('.k-vote-btn');
      if (rocketBtn) {
        if (newGroup === 'Backlog') {
          rocketBtn.disabled = false;
          rocketBtn.title = '';
          rocketBtn.onclick = (ev) => { ev.stopPropagation(); voteProject(id); };
        } else {
          rocketBtn.disabled = true;
          rocketBtn.title = 'Ya avanzó en el proceso';
          rocketBtn.onclick = null;
        }
      }
      updateMetrics(allProjects);

      // Guardar localmente
      saveLocal();
      showToast(`✓ Movido a ${newGroup}`,'success');
    });
  });
}

// ── Mover mes (local) ─────────────────────────────────────────
function patchMes(recordId, newBucket, prevBucket, proj) {
  const newSem = H1_MONTHS.has(newBucket) ? 'H1 2026' : H2_MONTHS.has(newBucket) ? 'H2 2026' : 'Backlog';

function wordSimilarity(a, b) {
  const stopwords = new Set(['de','el','la','los','las','un','una','en','con','para','por','del','y','a','al','es','se']);
  const wordsA = a.toLowerCase().split(/\s+/).filter(w => w.length > 2 && !stopwords.has(w));
  const wordsB = b.toLowerCase().split(/\s+/).filter(w => w.length > 2 && !stopwords.has(w));
  if (!wordsA.length || !wordsB.length) return 0;
  const matches = wordsA.filter(w => wordsB.some(wb => wb.includes(w) || w.includes(wb)));
  return matches.length / Math.min(wordsA.length, wordsB.length);
}

function checkSimilarProjects(input) {
  const panel = document.getElementById('similar-panel');
  if (!panel) return;
  const trimmed = input.trim();
  if (trimmed.length < 4) { panel.style.display = 'none'; return; }
  const candidates = allProjects.filter(p =>
    getStatusGroup(p.estatus) !== 'Backlog' &&
    wordSimilarity(trimmed, p.nombre) >= 0.4
  ).slice(0, 3);
  if (!candidates.length) { panel.style.display = 'none'; return; }
  panel.style.display = '';
  panel.innerHTML = `
    <div class="k-similar-title">⚠️ Proyectos similares en curso</div>
    ${candidates.map(p => {
      const gc = STATUS_GROUPS[getStatusGroup(p.estatus)];
      return `<div class="k-similar-item">
        <div class="k-similar-name">${escapeHtml(p.nombre)}</div>
        <span class="k-status-badge" style="background:${gc.bg};color:${gc.text};font-size:9px">${p.estatus}</span>
        <button class="k-similar-arrow-btn" onclick="openSimilarPreview('${p.id}')" title="Ver detalles">
          <svg viewBox="0 0 13 13" fill="none"><path d="M2 6.5h9M7 2l4.5 4.5L7 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>`;
    }).join('')}`;
}

function createProject() {
  const nameInput = document.getElementById('modal-new-name');
  const name = nameInput?.value.trim();
  if (!name) {
    nameInput?.classList.add('modal-name-error');
    nameInput?.focus();
    setTimeout(() => nameInput?.classList.remove('modal-name-error'), 1200);
    return;
  }

  const activeGroup = document.querySelector('.sgt-btn.active')?.dataset.group || 'Backlog';
  const estatus  = STATUS_GROUPS[activeGroup]?.statuses[0] || 'Nueva Captura';
  const desc     = document.getElementById('modal-new-desc')?.value.trim() || null;

  const btn = document.getElementById('modal-create-btn');
  btn.disabled = true; btn.textContent = 'Creando…';

  const newProj = {
    id:          genId(),
    nombre:      name,
    estatus,
    desc:        desc || '',
    area:        _selectedArea || '',
    categoria:   [..._selectedCategorias],
    prioridad:   '',
    semestre:    'Backlog',
    mes:         'Backlog',
    fechaInicio: document.getElementById('modal-fecha-inicio')?.value || '',
    fechaFin:    document.getElementById('modal-fecha-fin')?.value    || '',
  };
  allProjects.push(newProj);
  saveLocal();
  // Crear en Airtable y guardar el _atId
  createInAirtable(newProj).then(atId => {
    if (atId) { newProj._atId = atId; saveLocal(); }
  });
  // Transferir adjuntos temporales al ID real
  const attachSection = document.getElementById('modal-attach-section');
  const tempId = attachSection?.dataset.tempId;
  if (tempId) {
    const tempAttach = getAttachments(tempId);
    if (tempAttach.length) { saveAttachments(newProj.id, tempAttach); localStorage.removeItem(ATTACH_NS + tempId); }
  }
  updateMetrics(allProjects);
  closeModal();
  renderProjects();
  showToast(`✓ Proyecto creado: ${name}`, 'success');
}

function submitNewCard(mes) {
  const input   = document.getElementById(`addinput-${slugify(mes)}`);
  const confirm = document.getElementById(`addconfirm-${slugify(mes)}`);
  if (!input) return;
  const name = input.value.trim();
  if (!name) { input.focus(); return; }

  input.disabled = confirm.disabled = true;
  const sem = getSemestreFromBucket(mes);

  try {
    const newMes = (mes!=='H2 sin mes' && mes!=='Backlog') ? mes : 'Backlog';
    const newProj = { id:genId(), nombre:name, estatus:'Nueva Captura', desc:'', area:'', categoria:[], prioridad:'', semestre:sem, mes:newMes, fechaInicio:'', fechaFin:'' };
    allProjects.push(newProj);
    saveLocal();
    updateMetrics(allProjects);
    createInAirtable(newProj).then(atId => { if (atId) { newProj._atId = atId; saveLocal(); } });

    // Inject card into DOM before the form
    const body = document.getElementById(`body-${slugify(mes)}`);
    const form = document.querySelector(`.add-card-form[data-mes="${mes}"]`);
    const tmp  = document.createElement('div');
    tmp.innerHTML = renderKCard(newProj);
    const cardEl = tmp.firstElementChild;
    if (body && form) body.insertBefore(cardEl, form);

    // Attach DnD to new card
    cardEl.addEventListener('dragstart', e => {
      dragSrc = cardEl.dataset.id;
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',dragSrc);
      requestAnimationFrame(()=>cardEl.classList.add('is-dragging'));
    });
    cardEl.addEventListener('dragend', () => {
      cardEl.classList.remove('is-dragging');
      document.querySelectorAll('.kanban-body').forEach(b=>b.classList.remove('drag-over'));
      dragSrc = null;
    });

    cancelAddCard(mes);
    refreshKanbanCounts();
    showToast(`✓ Proyecto creado`,'success');
  } catch(err) {
    input.disabled = confirm.disabled = false;
    input.focus();
    showToast(`Error al crear proyecto`,'error');
  }
}

// ── Gantt helpers ─────────────────────────────────────────────
const GANTT_MONTHS = MONTH_NAMES.map(m => m + ' 2026'); // Jan–Dec 2026

function dateToGanttCol(dateStr) {
  if (!dateStr) return -1;
  const d = new Date(dateStr + 'T12:00:00');
  const label = MONTH_NAMES[d.getMonth()] + ' ' + d.getFullYear();
  return GANTT_MONTHS.indexOf(label); // 0–11, -1 if out of range
}

function fmtDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('es-MX', { day:'numeric', month:'short' });
}

function buildGanttSection(projects) {
  const withDates = projects.filter(p => p.fechaInicio && p.fechaFin);
  if (!withDates.length) return '';

  const now12 = new Date(); const curLabel = MONTH_NAMES[now12.getMonth()] + ' ' + now12.getFullYear();
  const todayCol = GANTT_MONTHS.indexOf(curLabel); // 0-based, -1 if not 2026

  const headCells = GANTT_MONTHS.map((m, i) =>
    `<div class="tl-gantt-month-head${i === todayCol ? ' is-today' : ''}">${m.slice(0,3).toUpperCase()}</div>`
  ).join('');

  const rows = withDates.map(p => {
    const sg = getStatusGroup(p.estatus);
    const color = STATUS_GROUPS[sg]?.color || 'var(--pine)';
    let startCol = dateToGanttCol(p.fechaInicio);
    let endCol   = dateToGanttCol(p.fechaFin);
    // Clamp to visible range
    if (startCol < 0) startCol = 0;
    if (endCol < 0)   endCol   = 11;
    if (endCol > 11)  endCol   = 11;
    if (startCol > 11) return ''; // completely out of range
    // grid-column is 1-based; col 1 = label, cols 2-13 = months
    const gStart = startCol + 2;
    const gEnd   = endCol   + 3; // end is exclusive

    // Build empty grid cells for background
    const bgCells = GANTT_MONTHS.map((_, i) =>
      `<div class="tl-gantt-cell${i === todayCol ? ' is-today' : ''}"></div>`
    ).join('');

    return `
      <div class="tl-gantt-row" style="cursor:pointer;" onclick="openModal('${p.id}')">
        <div class="tl-gantt-label" title="${escapeHtml(p.nombre)}">${escapeHtml(p.nombre)}</div>
        <div class="tl-gantt-bar" style="background:${color};grid-column:${gStart}/${gEnd};" onclick="event.stopPropagation();openModal('${p.id}')">
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis">${escapeHtml(p.nombre)}</span>
          <span class="tl-gantt-bar-dates">${fmtDate(p.fechaInicio)} → ${fmtDate(p.fechaFin)}</span>
        </div>
      </div>`;
  }).filter(Boolean).join('');

  if (!rows) return '';

  return `
    <div class="tl-gantt-section">
      <div class="tl-gantt-title">📅 Gantt — proyectos con fechas (${withDates.length})</div>
      <div class="tl-gantt-row" style="background:#FAFEFE;min-height:28px;">
        <div style="border-right:1px solid #DDF0EE;position:sticky;left:0;background:#FAFEFE;height:100%;"></div>
        ${headCells}
      </div>
      ${rows}
    </div>`;
}

function renderTimeline() {
  const main = document.getElementById('main-content');
  main.classList.add('tl-view');
  const projects = filteredProjects();
  if (!projects.length) { main.innerHTML='<div class="state-box"><span>No hay proyectos con estos filtros.</span></div>'; return; }

  // Group by area × bucket
  const areasInUse = Object.keys(AREA_COLORS).filter(a => projects.some(p => p.area === a));
  const hasNoArea = projects.some(p => !p.area);
  const rows = [...areasInUse, ...(hasNoArea ? ['(Sin área)'] : [])];

  // Build data[area][bucket]
  const data = {};
  for (const a of rows) { data[a] = {}; MONTHS.forEach(m => data[a][m] = []); }
  for (const p of projects) {
    const bucket = getDisplayBucket(p);
    if (!p.area) {
      data['(Sin área)'][bucket].push(p);
    } else if (data[p.area]) {
      data[p.area][bucket].push(p);
    }
  }

  // Helper to get cell classes
  function cellClass(m) {
    let c = '';
    if (m === CURRENT_MONTH) c += ' is-today';
    if (m === 'H2 sin mes')  c += ' h2b';
    return c.trim();
  }

  // Semester group header
  const semRow = `
    <div class="tl-row tl-sem-row">
      <div style="width:140px;flex-shrink:0;border-right:1px solid #DDF0EE;position:sticky;left:0;z-index:6;background:#FAFEFE"></div>
      <div class="tl-sem-cell h1-group">H1 2026</div>
      <div class="tl-sem-cell h2b-group">2do Sem.</div>
      <div class="tl-sem-cell h2-group">H2 2026</div>
      <div class="tl-sem-cell bl-group">Backlog</div>
    </div>`;

  // Month header
  const monthCells = MONTHS.map(m => {
    const isToday = m === CURRENT_MONTH;
    const isH2B   = m === 'H2 sin mes';
    const isBL    = m === 'Backlog';
    const label   = isH2B ? '2do Sem' : isBL ? 'Backlog' : m.slice(0,3).toUpperCase();
    return `<div class="tl-m-head${isToday?' is-today':''}${isH2B?' h2b':''}" data-col="${m}">
      <span>${label}</span>
      ${isToday ? '<span class="tl-today-tag">HOY</span>' : ''}
    </div>`;
  }).join('');

  const headRow = `
    <div class="tl-row tl-head-row">
      <div style="width:140px;flex-shrink:0;padding:8px 12px;border-right:1px solid #DDF0EE;position:sticky;left:0;z-index:6;background:#F7FBFB;display:flex;align-items:center">
        <span style="color:var(--gray-txt);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px">Área</span>
      </div>
      ${monthCells}
    </div>`;

  // Area rows
  const areaRows = rows.map(a => {
    const d = data[a];
    const total = MONTHS.reduce((s, m) => s + (d[m]?.length || 0), 0);
    if (!total) return '';
    const ac = AREA_COLORS[a] || { text:'#475569', bg:'#F1F5F9', emoji:'' };
    const cells = MONTHS.map(m => {
      const bars = (d[m] || []).map(p => `
        <div class="tl-bar" draggable="true" data-id="${p.id}" data-mes="${m}" style="background:${STATUS_GROUPS[getStatusGroup(p.estatus)].color}">
          <span class="tl-bar-dot"></span>
          <span class="tl-bar-name">${escapeHtml(p.nombre)}</span>
          <span class="tl-bar-extra">${escapeHtml(p.estatus)}</span>
        </div>`).join('');
      return `<div class="tl-data-cell ${cellClass(m)}" data-mes="${m}" data-area="${a}">
        ${bars}
        <button class="tl-add-cell-btn" title="Agregar proyecto" onclick="openNewProjectModal('${m}')">+</button>
      </div>`;
    }).join('');
    const rowLabel = a === '(Sin área)' ? a : `${ac.emoji} ${a}`;
    return `
      <div class="tl-row tl-data-row">
        <div style="width:140px;flex-shrink:0;padding:8px 12px;border-right:1px solid #DDF0EE;position:sticky;left:0;z-index:6;display:flex;flex-direction:column;justify-content:center;gap:4px">
          <span style="font-size:11px;font-weight:600;color:${ac.text || '#475569'};line-height:1.2">${rowLabel}</span>
          <span style="font-size:9px;font-weight:700;color:var(--white);background:var(--pine);padding:1px 6px;border-radius:10px;display:inline-block;width:fit-content">${total}</span>
        </div>
        ${cells}
      </div>`;
  }).join('');

  const ganttSection = buildGanttSection(projects);
  main.innerHTML = `
    <div class="tl-wrapper">
      <div class="tl-container">
        ${ganttSection}
        ${semRow}${headRow}${areaRows}
      </div>
    </div>`;
  setupTimelineDnD();
  setupTlTooltip();
  setupTlColExpand();
}

let activeTlCol = null;

function expandTlCol(col) {
  // Collapse first
  document.querySelectorAll('.tl-m-head.tl-col-active').forEach(el => el.classList.remove('tl-col-active'));
  document.querySelectorAll('.tl-data-cell.tl-col-active').forEach(el => el.classList.remove('tl-col-active'));

  document.querySelectorAll(`.tl-data-cell[data-mes="${col}"]`).forEach(el => el.classList.add('tl-col-active'));
}

function setupTlColExpand() {
  // Month header click → expand/toggle
  document.querySelectorAll('.tl-m-head[data-col]').forEach(head => {
    head.addEventListener('click', e => {
      e.stopPropagation();
      expandTlCol(head.dataset.col);
    });
  });
  // Click anywhere else in wrapper (not a bar / add btn / header) → collapse
  const wrapper = document.querySelector('.tl-wrapper');
  if (!wrapper) return;
  wrapper.addEventListener('click', e => {
    if (e.target.closest('.tl-m-head') ||
        e.target.closest('.tl-bar') ||

    expandTlCol(null);

// ── TIMELINE DnD ─────────────────────────────────────────────
